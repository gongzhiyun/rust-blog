<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550" style="background-color:#f8f9fa" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <!-- Code Area -->
  <rect x="20" y="20" width="760" height="150" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="30" rx="8" fill="#e1bee7"/>
  <text x="40" y="40" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#6a1b9a">演示代码：BufWriter 缓冲与刷新</text>
  
  <text x="40" y="70" font-family="JetBrains Mono, monospace" font-size="12" fill="#333">
    <tspan x="40" dy="1.2em"><tspan fill="#6a1b9a">use</tspan> std::io::<tspan fill="#1565c0">BufWriter</tspan>;</tspan>
    <tspan x="40" dy="1.5em"><tspan fill="#6a1b9a">use</tspan> std::fs::<tspan fill="#1565c0">File</tspan>;</tspan>
    <tspan x="40" dy="2.0em"><tspan fill="#6a1b9a">let</tspan> f = <tspan fill="#1565c0">File</tspan>::<tspan fill="#2e7d32">create</tspan>(<tspan fill="#f57c00">"out.txt"</tspan>)?;</tspan>
    <tspan x="40" dy="1.5em"><tspan fill="#6a1b9a">let</tspan> <tspan fill="#6a1b9a">mut</tspan> writer = <tspan fill="#1565c0">BufWriter</tspan>::<tspan fill="#2e7d32">new</tspan>(f);</tspan>
    <tspan x="40" dy="1.5em">writer.<tspan fill="#2e7d32">write</tspan>(<tspan fill="#f57c00">b"hello"</tspan>)?; <tspan fill="#78909c">// 1. Write to Buffer</tspan></tspan>
    <tspan x="40" dy="1.5em">writer.<tspan fill="#2e7d32">flush</tspan>()?;         <tspan fill="#78909c">// 2. Flush to Disk</tspan></tspan>
  </text>

  <!-- Flow Diagram Area -->
  <g transform="translate(0, 190)">
    
    <!-- Step 1: Write to Buffer -->
    <g transform="translate(50, 0)">
      <rect x="0" y="0" width="300" height="300" rx="12" fill="#fff3e0" stroke="#ffb74d" stroke-width="2"/>
      <rect x="0" y="0" width="300" height="35" rx="12" fill="#ffe0b2"/>
      <text x="150" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#ef6c00">Step 1: Write to Buffer</text>

      <!-- User Data -->
      <rect x="30" y="60" width="80" height="40" rx="4" fill="#e1bee7" stroke="#8e24aa"/>
      <text x="70" y="85" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#4a148c">"hello"</text>

      <!-- Arrow -->
      <path d="M110 80 L140 80" stroke="#8e24aa" stroke-width="2" marker-end="url(#arrow-purple)"/>

      <!-- Buffer -->
      <rect x="140" y="50" width="120" height="150" rx="8" fill="#fff" stroke="#ef6c00"/>
      <text x="200" y="70" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#ef6c00">Internal Buf</text>
      
      <!-- Buffer Content -->
      <g transform="translate(150, 80)">
         <rect x="0" y="0" width="100" height="20" fill="#ffe0b2" stroke="#ef6c00"/>
         <text x="50" y="15" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10">hello</text>
         <rect x="0" y="20" width="100" height="100" fill="#f5f5f5" stroke="#ef6c00" stroke-dasharray="4 2"/>
         <text x="50" y="70" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#9e9e9e">Empty</text>
      </g>

      <!-- Disk (Greyed out) -->
      <rect x="80" y="220" width="140" height="60" rx="8" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="2"/>
      <text x="150" y="255" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#bdbdbd">Disk File</text>
      
      <!-- Blocked Path -->
      <path d="M200 200 L200 220" stroke="#bdbdbd" stroke-width="2" stroke-dasharray="4 2"/>
      <text x="230" y="215" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#bdbdbd">No syscall</text>
    </g>

    <!-- Step 2: Flush -->
    <g transform="translate(450, 0)">
      <rect x="0" y="0" width="300" height="300" rx="12" fill="#e8f5e9" stroke="#81c784" stroke-width="2"/>
      <rect x="0" y="0" width="300" height="35" rx="12" fill="#c8e6c9"/>
      <text x="150" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#2e7d32">Step 2: Flush to Disk</text>

      <!-- Buffer -->
      <rect x="140" y="50" width="120" height="150" rx="8" fill="#fff" stroke="#2e7d32"/>
      <text x="200" y="70" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#2e7d32">Internal Buf</text>
      
      <!-- Buffer Content (Emptying) -->
      <g transform="translate(150, 80)">
         <rect x="0" y="0" width="100" height="20" fill="#fff" stroke="#2e7d32"/>
         <text x="50" y="15" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#9e9e9e">(cleared)</text>
         <rect x="0" y="20" width="100" height="100" fill="#f5f5f5" stroke="#2e7d32" stroke-dasharray="4 2"/>
      </g>

      <!-- Arrow Down -->
      <path d="M200 200 L200 220" stroke="#2e7d32" stroke-width="3" marker-end="url(#arrow-green)"/>

      <!-- Disk (Active) -->
      <rect x="80" y="220" width="140" height="60" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
      <text x="150" y="255" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#2e7d32">Disk File</text>
      
      <!-- Data on Disk -->
      <text x="250" y="255" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#4a148c">"hello"</text>
    </g>

    <!-- Definitions -->
    <defs>
      <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#8e24aa" />
      </marker>
      <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32" />
      </marker>
    </defs>

  </g>
</svg>