<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450" style="background-color:#f8f9fa" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <!-- Code Area -->
  <rect x="20" y="20" width="760" height="160" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2"/>
  <rect x="20" y="20" width="760" height="30" rx="8" fill="#e1bee7"/>
  <text x="40" y="40" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#6a1b9a">演示代码：基本 I/O 复制流</text>
  
  <text x="40" y="70" font-family="JetBrains Mono, monospace" font-size="12" fill="#333">
    <tspan x="40" dy="1.2em"><tspan fill="#6a1b9a">fn</tspan> <tspan fill="#2e7d32">copy_data</tspan>&lt;R: <tspan fill="#1565c0">Read</tspan>, W: <tspan fill="#1565c0">Write</tspan>&gt;(reader: &amp;<tspan fill="#6a1b9a">mut</tspan> R, writer: &amp;<tspan fill="#6a1b9a">mut</tspan> W) -&gt; io::Result&lt;()&gt; {</tspan>
    <tspan x="40" dy="1.5em">    <tspan fill="#6a1b9a">let</tspan> <tspan fill="#6a1b9a">mut</tspan> buffer = [<tspan fill="#f57c00">0</tspan>; <tspan fill="#f57c00">1024</tspan>]; <tspan fill="#78909c">// Stack buffer</tspan></tspan>
    <tspan x="40" dy="1.5em">    <tspan fill="#6a1b9a">loop</tspan> {</tspan>
    <tspan x="40" dy="1.5em">        <tspan fill="#6a1b9a">let</tspan> n = reader.<tspan fill="#2e7d32">read</tspan>(&amp;<tspan fill="#6a1b9a">mut</tspan> buffer)?;</tspan>
    <tspan x="40" dy="1.5em">        <tspan fill="#6a1b9a">if</tspan> n == <tspan fill="#f57c00">0</tspan> { <tspan fill="#6a1b9a">break</tspan>; }</tspan>
    <tspan x="40" dy="1.5em">        writer.<tspan fill="#2e7d32">write_all</tspan>(&amp;buffer[..n])?;</tspan>
    <tspan x="40" dy="1.5em">    }</tspan>
    <tspan x="40" dy="1.5em">    Ok(())</tspan>
    <tspan x="40" dy="1.5em">}</tspan>
  </text>

  <!-- Diagram Area -->
  <g transform="translate(0, 200)">
    <!-- Source (Abstract) -->
    <rect x="50" y="50" width="120" height="100" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
    <text x="110" y="80" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#1565c0">Reader</text>
    <text x="110" y="105" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#333">(File/Socket)</text>
    <path d="M110 120 L110 140" stroke="#1565c0" stroke-width="2" stroke-dasharray="4 2"/>

    <!-- Buffer (Stack) -->
    <rect x="300" y="50" width="200" height="100" rx="8" fill="#fff8e1" stroke="#ff9800" stroke-width="2"/>
    <text x="400" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#f57c00">Stack Buffer</text>
    <rect x="310" y="70" width="30" height="60" fill="#fff" stroke="#ff9800"/>
    <rect x="340" y="70" width="30" height="60" fill="#fff" stroke="#ff9800"/>
    <rect x="370" y="70" width="30" height="60" fill="#fff" stroke="#ff9800"/>
    <rect x="400" y="70" width="30" height="60" fill="#e0e0e0" stroke="#ff9800" stroke-dasharray="4 2"/>
    <rect x="430" y="70" width="30" height="60" fill="#e0e0e0" stroke="#ff9800" stroke-dasharray="4 2"/>
    <rect x="460" y="70" width="30" height="60" fill="#e0e0e0" stroke="#ff9800" stroke-dasharray="4 2"/>
    <text x="355" y="105" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#333">Data</text>

    <!-- Destination (Abstract) -->
    <rect x="630" y="50" width="120" height="100" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="690" y="80" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#2e7d32">Writer</text>
    <text x="690" y="105" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#333">(File/Socket)</text>
    <path d="M690 120 L690 140" stroke="#2e7d32" stroke-width="2" stroke-dasharray="4 2"/>

    <!-- Arrows -->
    <defs>
      <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#1565c0" />
      </marker>
      <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32" />
      </marker>
    </defs>

    <!-- Read Flow -->
    <path d="M170 100 L300 100" stroke="#1565c0" stroke-width="3" marker-end="url(#arrow-blue)"/>
    <text x="235" y="90" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#1565c0">read()</text>

    <!-- Write Flow -->
    <path d="M500 100 L630 100" stroke="#2e7d32" stroke-width="3" marker-end="url(#arrow-green)"/>
    <text x="565" y="90" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#2e7d32">write_all()</text>

    <!-- Loop Indicator -->
    <path d="M350 160 Q400 190 450 160" stroke="#9c27b0" stroke-width="2" fill="none" stroke-dasharray="5 5"/>
    <text x="400" y="185" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#9c27b0">Loop until n == 0</text>
  </g>
</svg>