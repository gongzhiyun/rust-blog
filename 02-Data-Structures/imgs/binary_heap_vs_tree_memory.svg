<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400" style="background:#f8f9fa; font-family:'JetBrains Mono', monospace;">
    <!-- Background -->
    <rect width="900" height="400" fill="#f8f9fa"/>
    <text x="450" y="30" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">内存开销对比: BinaryHeap vs Pointer Tree</text>

    <!-- BinaryHeap Section -->
    <g transform="translate(50, 60)">
        <rect x="0" y="0" width="800" height="140" rx="12" fill="#ffffff" stroke="#e0e0e0"/>
        <rect x="0" y="0" width="800" height="35" rx="12" fill="#e8f5e9"/>
        <text x="20" y="24" font-size="14" font-weight="bold" fill="#2e7d32">BinaryHeap&lt;i32&gt; (Zero Overhead)</text>
        
        <g transform="translate(50, 60)">
            <text x="0" y="-10" font-size="12" fill="#555">Compact Memory (Vec):</text>
            
            <!-- Continuous Block -->
            <rect x="0" y="0" width="60" height="40" fill="#a5d6a7" stroke="#2e7d32"/>
            <text x="30" y="25" font-size="12" text-anchor="middle">i32</text>
            
            <rect x="60" y="0" width="60" height="40" fill="#a5d6a7" stroke="#2e7d32"/>
            <text x="90" y="25" font-size="12" text-anchor="middle">i32</text>
            
            <rect x="120" y="0" width="60" height="40" fill="#a5d6a7" stroke="#2e7d32"/>
            <text x="150" y="25" font-size="12" text-anchor="middle">i32</text>
            
            <rect x="180" y="0" width="60" height="40" fill="#a5d6a7" stroke="#2e7d32"/>
            <text x="210" y="25" font-size="12" text-anchor="middle">i32</text>
            
            <rect x="240" y="0" width="60" height="40" fill="#a5d6a7" stroke="#2e7d32"/>
            <text x="270" y="25" font-size="12" text-anchor="middle">i32</text>

            <text x="310" y="25" font-size="12" fill="#666">...</text>

            <!-- Memory Usage -->
            <text x="350" y="25" font-size="14" font-weight="bold" fill="#2e7d32">Total: N * 4 bytes</text>
        </g>

        <!-- Code Block -->
        <g transform="translate(600, 50)">
             <rect x="0" y="0" width="180" height="80" rx="4" fill="#f8f9fa" stroke="#2e7d32" stroke-dasharray="4 2"/>
             <text x="10" y="20" font-family="monospace" font-size="10" fill="#2e7d32">struct BinaryHeap {</text>
             <text x="20" y="35" font-family="monospace" font-size="10" fill="#333">data: Vec&lt;i32&gt;</text>
             <text x="10" y="50" font-family="monospace" font-size="10" fill="#2e7d32">}</text>
             <text x="10" y="70" font-family="monospace" font-size="10" fill="#666">// Just data!</text>
        </g>
    </g>

    <!-- Pointer Tree Section -->
    <g transform="translate(50, 220)">
        <rect x="0" y="0" width="800" height="140" rx="12" fill="#ffffff" stroke="#e0e0e0"/>
        <rect x="0" y="0" width="800" height="35" rx="12" fill="#ffebee"/>
        <text x="20" y="24" font-size="14" font-weight="bold" fill="#c62828">Pointer-based Tree (Heavy Overhead)</text>
        
        <g transform="translate(50, 60)">
            <text x="0" y="-10" font-size="12" fill="#555">Fragmented Memory (Node = Data + Ptrs):</text>
            
            <!-- Node 1 -->
            <g transform="translate(0, 0)">
                <rect x="0" y="0" width="40" height="40" fill="#ef9a9a" stroke="#c62828"/>
                <text x="20" y="25" font-size="12" text-anchor="middle">i32</text>
                
                <rect x="40" y="0" width="40" height="40" fill="#ffebee" stroke="#c62828"/>
                <text x="60" y="25" font-size="10" text-anchor="middle">left</text>
                
                <rect x="80" y="0" width="40" height="40" fill="#ffebee" stroke="#c62828"/>
                <text x="100" y="25" font-size="10" text-anchor="middle">right</text>
            </g>

            <!-- Arrow to Node 2 -->
            <path d="M60,40 L80,70" stroke="#ccc" stroke-width="2" marker-end="url(#arrow-grey)"/>

            <!-- Node 2 (Dispersed) -->
            <g transform="translate(80, 70)">
                <rect x="0" y="0" width="40" height="40" fill="#ef9a9a" stroke="#c62828"/>
                <rect x="40" y="0" width="40" height="40" fill="#ffebee" stroke="#c62828"/>
                <rect x="80" y="0" width="40" height="40" fill="#ffebee" stroke="#c62828"/>
            </g>
            
             <!-- Arrow to Node 3 -->
            <path d="M100,40 L160,70" stroke="#ccc" stroke-width="2" marker-end="url(#arrow-grey)"/>

            <!-- Node 3 (Dispersed) -->
            <g transform="translate(160, 70)">
                <rect x="0" y="0" width="40" height="40" fill="#ef9a9a" stroke="#c62828"/>
                <rect x="40" y="0" width="40" height="40" fill="#ffebee" stroke="#c62828"/>
                <rect x="80" y="0" width="40" height="40" fill="#ffebee" stroke="#c62828"/>
            </g>

            <!-- Memory Usage -->
            <text x="350" y="25" font-size="14" font-weight="bold" fill="#c62828">Total: N * (4 + 8 + 8) = N * 20 bytes</text>
            <text x="350" y="45" font-size="12" fill="#c62828">(Assuming 64-bit pointers)</text>
            <text x="350" y="65" font-size="12" fill="#d32f2f">-> 5x Memory Usage!</text>
        </g>

        <!-- Code Block -->
        <g transform="translate(600, 50)">
             <rect x="0" y="0" width="180" height="80" rx="4" fill="#f8f9fa" stroke="#c62828" stroke-dasharray="4 2"/>
             <text x="10" y="20" font-family="monospace" font-size="10" fill="#c62828">struct Node {</text>
             <text x="20" y="35" font-family="monospace" font-size="10" fill="#333">val: i32,</text>
             <text x="20" y="50" font-family="monospace" font-size="10" fill="#333">left: Option&lt;Box&lt;Node&gt;&gt;,</text>
             <text x="20" y="65" font-family="monospace" font-size="10" fill="#333">right: Option&lt;Box&lt;Node&gt;&gt;</text>
             <text x="10" y="80" font-family="monospace" font-size="10" fill="#c62828">}</text>
        </g>
    </g>

    <defs>
        <marker id="arrow-grey" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#ccc" />
        </marker>
    </defs>
</svg>