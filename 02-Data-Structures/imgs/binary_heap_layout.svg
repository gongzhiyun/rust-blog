<svg xmlns="http://www.w3.org/2000/svg" width="900" height="450" viewBox="0 0 900 450" style="background:#f8f9fa; font-family:'JetBrains Mono', monospace;">
    <!-- Background -->
    <rect width="900" height="450" fill="#f8f9fa"/>
    <text x="450" y="30" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">BinaryHeap: 初始化与内存布局</text>

    <!-- Code Block (Usage) -->
    <g transform="translate(50, 60)">
        <rect x="0" y="0" width="280" height="120" rx="8" fill="#f3e5f5" stroke="#9c27b0"/>
        <text x="140" y="24" font-size="14" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Usage Code</text>
        <line x1="0" y1="35" x2="280" y2="35" stroke="#ce93d8" stroke-dasharray="4"/>
        
        <g transform="translate(15, 55)">
            <text x="0" y="0" font-family="monospace" font-size="12" fill="#333">use std::collections::BinaryHeap;</text>
            <text x="0" y="25" font-family="monospace" font-size="12" fill="#333">fn main() {</text>
            <text x="20" y="50" font-family="monospace" font-size="12" fill="#2e7d32" font-weight="bold">let heap = BinaryHeap::from(</text>
            <text x="40" y="75" font-family="monospace" font-size="12" fill="#2e7d32" font-weight="bold">vec![100, 19, 36, 17, 3, 25, 1]</text>
            <text x="20" y="100" font-family="monospace" font-size="12" fill="#2e7d32" font-weight="bold">);</text>
            <text x="0" y="125" font-family="monospace" font-size="12" fill="#333">}</text>
        </g>
    </g>

    <!-- Arrow from Code to Memory -->
    <path d="M340,120 L380,120" stroke="#9c27b0" stroke-width="2" marker-end="url(#arrow-purple)"/>
    <text x="360" y="110" font-size="12" fill="#9c27b0" text-anchor="middle">Creates</text>

    <!-- Physical View (Vec) -->
    <g transform="translate(400, 60)">
        <!-- Title Box -->
        <rect x="0" y="0" width="450" height="35" rx="8" fill="#e8f5e9"/>
        <text x="225" y="24" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">Memory State (Vec&lt;i32&gt;)</text>

        <!-- Vec Memory Layout -->
        <g transform="translate(20, 60)">
            <!-- Stack Part (Vec struct) -->
            <rect x="0" y="0" width="100" height="90" rx="8" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
            <text x="50" y="-10" font-size="12" fill="#333" text-anchor="middle">Stack</text>
            
            <rect x="10" y="10" width="80" height="20" fill="#fff8e1" stroke="#ff9800"/>
            <text x="50" y="24" font-size="10" fill="#333" text-anchor="middle">ptr</text>
            <rect x="10" y="35" width="80" height="20" fill="#f5f5f5" stroke="#e0e0e0"/>
            <text x="50" y="49" font-size="10" fill="#333" text-anchor="middle">cap: 7</text>
            <rect x="10" y="60" width="80" height="20" fill="#f5f5f5" stroke="#e0e0e0"/>
            <text x="50" y="74" font-size="10" fill="#333" text-anchor="middle">len: 7</text>

            <!-- Pointer Line -->
            <path d="M90,20 C120,20 120,20 130,20" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow-orange)"/>

            <!-- Heap Part (Array) -->
            <g transform="translate(140, 0)">
                <text x="140" y="-10" font-size="12" fill="#333" text-anchor="middle">Heap (Contiguous Array)</text>
                
                <!-- Array Cells -->
                <g transform="translate(0, 0)">
                    <rect x="0" y="0" width="40" height="40" fill="#ffffff" stroke="#333"/>
                    <text x="20" y="25" font-size="12" font-weight="bold" text-anchor="middle">100</text>
                    <text x="20" y="55" font-size="10" fill="#666">0</text>
                </g>
                <g transform="translate(40, 0)">
                    <rect x="0" y="0" width="40" height="40" fill="#ffffff" stroke="#333"/>
                    <text x="20" y="25" font-size="12" font-weight="bold" text-anchor="middle">19</text>
                    <text x="20" y="55" font-size="10" fill="#666">1</text>
                </g>
                <g transform="translate(80, 0)">
                    <rect x="0" y="0" width="40" height="40" fill="#ffffff" stroke="#333"/>
                    <text x="20" y="25" font-size="12" font-weight="bold" text-anchor="middle">36</text>
                    <text x="20" y="55" font-size="10" fill="#666">2</text>
                </g>
                <g transform="translate(120, 0)">
                    <rect x="0" y="0" width="40" height="40" fill="#ffffff" stroke="#333"/>
                    <text x="20" y="25" font-size="12" font-weight="bold" text-anchor="middle">17</text>
                    <text x="20" y="55" font-size="10" fill="#666">3</text>
                </g>
                <g transform="translate(160, 0)">
                    <rect x="0" y="0" width="40" height="40" fill="#ffffff" stroke="#333"/>
                    <text x="20" y="25" font-size="12" font-weight="bold" text-anchor="middle">3</text>
                    <text x="20" y="55" font-size="10" fill="#666">4</text>
                </g>
                <g transform="translate(200, 0)">
                    <rect x="0" y="0" width="40" height="40" fill="#ffffff" stroke="#333"/>
                    <text x="20" y="25" font-size="12" font-weight="bold" text-anchor="middle">25</text>
                    <text x="20" y="55" font-size="10" fill="#666">5</text>
                </g>
                <g transform="translate(240, 0)">
                    <rect x="0" y="0" width="40" height="40" fill="#ffffff" stroke="#333"/>
                    <text x="20" y="25" font-size="12" font-weight="bold" text-anchor="middle">1</text>
                    <text x="20" y="55" font-size="10" fill="#666">6</text>
                </g>
            </g>
        </g>
    </g>

    <!-- Logical Interpretation -->
    <g transform="translate(400, 220)">
        <text x="0" y="0" font-size="12" fill="#555">Interpret as Tree (Implicit):</text>
        <!-- Mini Tree -->
        <g transform="translate(140, 20)">
             <!-- Edges -->
            <line x1="70" y1="0" x2="35" y2="30" stroke="#ccc" stroke-width="1"/>
            <line x1="70" y1="0" x2="105" y2="30" stroke="#ccc" stroke-width="1"/>
            <line x1="35" y1="30" x2="17" y2="60" stroke="#ccc" stroke-width="1"/>
            <line x1="35" y1="30" x2="53" y2="60" stroke="#ccc" stroke-width="1"/>
            <line x1="105" y1="30" x2="87" y2="60" stroke="#ccc" stroke-width="1"/>
            <line x1="105" y1="30" x2="123" y2="60" stroke="#ccc" stroke-width="1"/>

            <!-- Nodes -->
            <circle cx="70" cy="0" r="12" fill="#fff" stroke="#333"/> <text x="70" y="4" font-size="10" text-anchor="middle">100</text>
            <circle cx="35" cy="30" r="12" fill="#fff" stroke="#333"/> <text x="35" y="34" font-size="10" text-anchor="middle">19</text>
            <circle cx="105" cy="30" r="12" fill="#fff" stroke="#333"/> <text x="105" y="34" font-size="10" text-anchor="middle">36</text>
            <circle cx="17" cy="60" r="12" fill="#fff" stroke="#333"/> <text x="17" y="64" font-size="10" text-anchor="middle">17</text>
            <circle cx="53" cy="60" r="12" fill="#fff" stroke="#333"/> <text x="53" y="64" font-size="10" text-anchor="middle">3</text>
            <circle cx="87" cy="60" r="12" fill="#fff" stroke="#333"/> <text x="87" y="64" font-size="10" text-anchor="middle">25</text>
            <circle cx="123" cy="60" r="12" fill="#fff" stroke="#333"/> <text x="123" y="64" font-size="10" text-anchor="middle">1</text>
        </g>
    </g>

    <defs>
        <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#9c27b0" />
        </marker>
        <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#ff9800" />
        </marker>
    </defs>
</svg>