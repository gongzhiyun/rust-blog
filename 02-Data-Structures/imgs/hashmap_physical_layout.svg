<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="1150" viewBox="0 0 800 1150" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <!-- Background -->
  <rect width="800" height="1150" fill="#f8f9fa" rx="15"/>
  <!-- Title -->
  <text x="400" y="45" font-family="JetBrains Mono, monospace" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">HashMap 物理布局演进</text>
  <!-- Code Section -->
  <g transform="translate(50, 80)">
    <rect width="700" height="150" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <path d="M0 12 Q0 0 12 0 H688 Q700 0 700 12 V35 H0 Z" fill="#f3e5f5"/>
    <text x="350" y="22" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#6a1b9a" text-anchor="middle">演示代码</text>
    <g transform="translate(30, 55)">
      <text font-family="JetBrains Mono, monospace" font-size="13" line-height="1.5em">
        <tspan x="0" dy="0"><tspan fill="#6a1b9a">fn</tspan> <tspan fill="#2e7d32">main</tspan><tspan fill="#333">() {</tspan></tspan>
        <tspan x="20" dy="1.4em"><tspan fill="#6a1b9a">let</tspan> <tspan fill="#6a1b9a">mut</tspan> <tspan fill="#333">map = </tspan><tspan fill="#1565c0">HashMap</tspan><tspan fill="#333">::</tspan><tspan fill="#2e7d32">new</tspan><tspan fill="#333">(); </tspan><tspan fill="#78909c">// Step 1</tspan></tspan>
        <tspan x="20" dy="1.4em"><tspan fill="#333">map.</tspan><tspan fill="#2e7d32">insert</tspan><tspan fill="#333">(</tspan><tspan fill="#f57c00">"Hello"</tspan><tspan fill="#333">, </tspan><tspan fill="#f57c00">2026</tspan><tspan fill="#333">);   </tspan><tspan fill="#78909c">// Step 2</tspan></tspan>
        <tspan x="0" dy="1.4em"><tspan fill="#333">}</tspan></tspan>
      </text>
    </g>
  </g>
  <!-- Step 1: Lazy Initialization -->
  <g transform="translate(50, 260)">
    <rect x="-10" y="-15" width="260" height="25" rx="12.5" fill="#f3e5f5" opacity="0.5"/>
    <text x="0" y="2" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#6a1b9a">Step 1: 惰性初始化 (Lazy Init)</text>
    <!-- Stack -->
    <g transform="translate(0, 50)">
      <rect width="250" height="250" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
      <path d="M0 12 Q0 0 12 0 H238 Q250 0 250 12 V35 H0 Z" fill="#e3f2fd"/>
      <text x="125" y="22" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="middle">Stack</text>
      <g transform="translate(15, 45)">
        <rect width="220" height="40" rx="4" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
        <text x="10" y="24" font-family="JetBrains Mono, monospace" font-size="11" fill="#546e7a">hash_builder</text>
        <text x="210" y="24" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="end">RandomState</text>
        <rect y="45" width="220" height="28" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
        <text x="10" y="63" font-family="JetBrains Mono, monospace" font-size="11" fill="#546e7a">ctrl</text>
        <text x="210" y="63" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="end">EMPTY_STATIC</text>
        <rect y="78" width="220" height="28" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
        <text x="10" y="96" font-family="JetBrains Mono, monospace" font-size="11" fill="#546e7a">bucket_mask</text>
        <text x="210" y="96" font-family="JetBrains Mono, monospace" font-size="11" fill="#333" text-anchor="end">0</text>
        <rect y="111" width="220" height="28" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
        <text x="10" y="129" font-family="JetBrains Mono, monospace" font-size="11" fill="#546e7a">items</text>
        <text x="210" y="129" font-family="JetBrains Mono, monospace" font-size="11" fill="#333" text-anchor="end">0</text>
        <rect y="144" width="220" height="28" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
        <text x="10" y="162" font-family="JetBrains Mono, monospace" font-size="11" fill="#546e7a">growth_left</text>
        <text x="210" y="162" font-family="JetBrains Mono, monospace" font-size="11" fill="#333" text-anchor="end">0</text>
      </g>
    </g>
    <!-- Heap -->
    <g transform="translate(280, 50)">
      <rect width="420" height="250" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
      <path d="M0 12 Q0 0 12 0 H408 Q420 0 420 12 V35 H0 Z" fill="#e8f5e9"/>
      <text x="210" y="22" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">Heap</text>
      <text x="210" y="140" font-family="JetBrains Mono, monospace" font-size="14" fill="#bdbdbd" text-anchor="middle">零分配 (Zero Allocation)</text>
    </g>
  </g>
  <!-- Step 2: First Insertion -->
  <g transform="translate(50, 600)">
    <rect x="-10" y="-15" width="255" height="25" rx="12.5" fill="#f3e5f5" opacity="0.5"/>
    <text x="0" y="2" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#6a1b9a">Step 2: 首次插入 (触发堆分配)</text>
    
    <!-- Hash Splitting Logic (Left Corner) -->
    <g transform="translate(25, 340)">
      <rect width="210" height="55" rx="4" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
      <text x="105" y="15" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">Hash("Hello") = 0x...83BA</text>
      <line x1="10" y1="22" x2="200" y2="22" stroke="#ffb74d" stroke-width="0.5" stroke-dasharray="2 2"/>
      <text x="55" y="35" text-anchor="middle" font-size="8" fill="#e65100">h1: 0x...BA (高位)</text>
      <text x="55" y="46" text-anchor="middle" font-size="7" fill="#f57c00" font-style="italic">(0xBA &amp; 15 = Index 10)</text>
      <line x1="105" y1="24" x2="105" y2="48" stroke="#ffb74d" stroke-width="1"/>
      <text x="155" y="35" text-anchor="middle" font-size="8" font-weight="bold" fill="#6a1b9a">h2: 0x5A</text>
      <text x="155" y="46" text-anchor="middle" font-size="7" fill="#9c27b0" font-style="italic">(低7位特征值)</text>
    </g>
    <!-- Stack -->
    <g transform="translate(0, 50)">
      <rect width="250" height="250" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
      <path d="M0 12 Q0 0 12 0 H238 Q250 0 250 12 V35 H0 Z" fill="#e3f2fd"/>
      <text x="125" y="22" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="middle">Stack</text>
      <g transform="translate(15, 45)">
        <rect width="220" height="40" rx="4" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
        <text x="10" y="24" font-family="JetBrains Mono, monospace" font-size="11" fill="#546e7a">hash_builder</text>
        <text x="210" y="24" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="end">RandomState</text>
        <rect y="45" width="220" height="28" rx="4" fill="#fff8e1" stroke="#ff9800" stroke-width="1.5"/>
        <text x="10" y="63" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#546e7a">ctrl</text>
        <text x="210" y="63" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#f57c00" text-anchor="end">0x55aa</text>
        <rect y="78" width="220" height="28" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
        <text x="10" y="96" font-family="JetBrains Mono, monospace" font-size="11" fill="#546e7a">bucket_mask</text>
        <text x="210" y="96" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#333" text-anchor="end">255</text>
        <rect y="111" width="220" height="28" rx="4" fill="#e1f5fe" stroke="#03a9f4" stroke-width="1.5"/>
        <text x="10" y="129" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#01579b">items</text>
        <text x="210" y="129" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#01579b" text-anchor="end">1</text>
        <rect y="144" width="220" height="28" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
        <text x="10" y="162" font-family="JetBrains Mono, monospace" font-size="11" fill="#546e7a">growth_left</text>
        <text x="210" y="162" font-family="JetBrains Mono, monospace" font-size="11" fill="#333" text-anchor="end">191</text>
        <text x="110" y="185" text-anchor="middle" font-size="8" fill="#78909c" font-style="italic">(剩余可插入数量，减至0则扩容)</text>
      </g>
    </g>
    <!-- Heap -->
    <g transform="translate(280, 50)">
      <rect width="450" height="420" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
      <path d="M0 12 Q0 0 12 0 H438 Q450 0 450 12 V35 H0 Z" fill="#e8f5e9"/>
      <text x="225" y="22" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">Heap</text>
      <rect x="15" y="50" width="420" height="350" rx="8" fill="#fafafa" stroke="#4caf50" stroke-width="1.5" stroke-dasharray="6 3"/>
      <text x="25" y="68" font-size="10" font-weight="bold" fill="#2e7d32">Layout: [Data Slots] [Control Bytes]</text>
      <!-- Data Slots -->
      <g transform="translate(45, 80)">
        <rect width="380" height="180" rx="6" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
        <text x="10" y="18" font-size="10" font-weight="bold" fill="#616161">Data Slots (由 ctrl 指针向前偏移访问)</text>
        <!-- Negative Offset Ruler -->
        <g transform="translate(-25, 30)">
          <line x1="15" y1="0" x2="15" y2="140" stroke="#90a4ae" stroke-width="1" stroke-dasharray="2 2"/>
          <g font-family="PingFang SC, Hiragino Sans GB, Microsoft YaHei, sans-serif" font-size="9" fill="#90a4ae" text-anchor="start">
            <text x="3" y="55">负</text>
            <text x="3" y="68">偏</text>
            <text x="3" y="81">移</text>
          </g>
          <path d="M15,10 L10,0 L20,0 Z" fill="#90a4ae" transform="rotate(180, 15, 5)"/>
        </g>
        <!-- Slot 1 -->
        <g transform="translate(10, 30)">
          <rect width="360" height="140" rx="6" fill="#ffffff" stroke="#03a9f4" stroke-width="1.5"/>
          <path d="M0 6 Q0 0 6 0 H354 Q360 0 360 6 V22 H0 Z" fill="#e1f5fe"/>
          <text x="180" y="15" text-anchor="middle" font-size="10" font-weight="bold" fill="#01579b">Slot (Index: 163)</text>
          <g transform="translate(10, 30)">
            <rect width="165" height="45" rx="4" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
            <text x="5" y="15" font-size="9" fill="#78909c">Key: ptr</text>
            <text x="160" y="32" text-anchor="end" font-size="11" font-weight="bold" fill="#f57c00">0x8000</text>
            <rect x="175" width="165" height="45" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
            <text x="180" y="15" font-size="9" fill="#78909c">Key: len</text>
            <text x="335" y="32" text-anchor="end" font-size="11" font-weight="bold" fill="#333">5</text>
          </g>
          <g transform="translate(10, 85)">
            <rect width="165" height="45" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
            <text x="5" y="15" font-size="9" fill="#78909c">Value: i32</text>
            <text x="160" y="32" text-anchor="end" font-size="11" font-weight="bold" fill="#1b5e20">2026</text>
            <rect x="175" width="165" height="45" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4 2"/>
            <text x="180" y="15" font-size="9" fill="#bdbdbd">Padding (对齐)</text>
          </g>
        </g>
      </g>
      <!-- Control Bytes -->
      <g transform="translate(45, 275)">
        <rect width="380" height="110" rx="6" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
        <text x="10" y="18" font-size="10" font-weight="bold" fill="#6a1b9a">Control Bytes (基准地址 / 元数据区)</text>
        <g transform="translate(10, 30)">
          <rect width="360" height="50" rx="4" fill="#ffffff" stroke="#ab47bc" stroke-width="1" stroke-dasharray="4 2"/>
          <text x="180" y="18" text-anchor="middle" font-size="9" fill="#9c27b0" font-style="italic">SIMD Group [10] (16 Bytes 并行匹配)</text>
          <g transform="translate(15, 25)">
            <rect width="30" height="20" fill="#eeeeee" stroke="#bdbdbd"/>
            <text x="15" y="14" text-anchor="middle" font-size="9" fill="#757575">1A</text>
            <rect x="30" width="30" height="20" fill="#eeeeee" stroke="#bdbdbd"/>
            <text x="45" y="14" text-anchor="middle" font-size="9" fill="#757575">2B</text>
            <rect x="60" width="30" height="20" fill="#eeeeee" stroke="#bdbdbd"/>
            <text x="75" y="14" text-anchor="middle" font-size="9" fill="#757575">3C</text>
            <rect x="90" width="30" height="20" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
            <text x="105" y="14" text-anchor="middle" font-size="9" fill="#1b5e20" font-weight="bold">5A</text>
            <rect x="120" width="210" height="20" fill="#ffffff" stroke="#e0e0e0" stroke-dasharray="2 1"/>
            <text x="225" y="14" text-anchor="middle" font-size="9" fill="#bdbdbd">SIMD 一键匹配 0x5A</text>
          </g>
        </g>
        <text x="10" y="100" font-size="10" font-weight="bold" fill="#f57c00">ctrl → 0x55aa (物理起始点)</text>
      </g>
    </g>
    <!-- Flow line from Stack to Hash Logic to Heap (Top Layer) -->
     <circle cx="125" cy="300" r="3" fill="#9c27b0" />
      <path d="M125,300 L125,335 L125,340" fill="none" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="4 2" />
       <path d="M130,395 C130,480 280,380 320,380 L325,380" fill="none" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrow-purple)"/>
  </g>
  <!-- Footer Note -->
  <g transform="translate(50, 1100)">
    <rect width="700" height="30" rx="8" fill="#fff9c4" opacity="0.3"/>
    <text x="350" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#455a64" text-anchor="middle">💡 SwissTable 布局：[Data Slots][Control Bytes]，ctrl 指向元数据起始处，通过负偏移访问数据。</text>
  </g>
  <!-- Definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L0,10 L9,5 Z" fill="#ff9800" />
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L0,10 L9,5 Z" fill="#9c27b0" />
    </marker>
  </defs>
</svg>