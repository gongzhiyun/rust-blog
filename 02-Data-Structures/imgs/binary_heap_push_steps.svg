<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="800" viewBox="0 0 1000 800" style="background:#f8f9fa; font-family:'JetBrains Mono', monospace;">
    <!-- Background -->
    <rect width="1000" height="800" fill="#f8f9fa"/>
    <text x="500" y="30" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">BinaryHeap Push: 上浮 (Sift Up) 全过程</text>

    <!-- Step 1: Append -->
    <g transform="translate(50, 60)">
        <rect x="0" y="0" width="650" height="200" rx="12" fill="#ffffff" stroke="#e0e0e0"/>
        <rect x="0" y="0" width="650" height="35" rx="12" fill="#e3f2fd"/>
        <text x="20" y="24" font-size="14" font-weight="bold" fill="#1565c0">Step 1: 尾部插入 (Append)</text>
        <text x="250" y="24" font-size="12" fill="#555">新元素 50 被放在 Vec 的末尾，破坏了堆性质。</text>
        
        <!-- Tree View -->
        <g transform="translate(30, 60)">
             <!-- Edges -->
            <line x1="100" y1="20" x2="60" y2="60" stroke="#ccc" stroke-width="2"/>
            <line x1="100" y1="20" x2="140" y2="60" stroke="#ccc" stroke-width="2"/>
            <line x1="60" y1="60" x2="40" y2="100" stroke="#ccc" stroke-width="2"/>
            <line x1="60" y1="60" x2="80" y2="100" stroke="#ccc" stroke-width="2"/>
            
            <!-- Nodes -->
            <circle cx="100" cy="20" r="15" fill="#fff" stroke="#333"/> <text x="100" y="25" font-size="10" text-anchor="middle">100</text>
            <circle cx="60" cy="60" r="15" fill="#fff" stroke="#333"/> <text x="60" y="65" font-size="10" text-anchor="middle">19</text>
            <circle cx="140" cy="60" r="15" fill="#fff" stroke="#333"/> <text x="140" y="65" font-size="10" text-anchor="middle">36</text>
            
            <circle cx="40" cy="100" r="15" fill="#fff" stroke="#333"/> <text x="40" y="105" font-size="10" text-anchor="middle">17</text>
            <circle cx="80" cy="100" r="15" fill="#fff" stroke="#333"/> <text x="80" y="105" font-size="10" text-anchor="middle">3</text>

            <!-- New Node -->
            <line x1="40" y1="100" x2="20" y2="140" stroke="#ff9800" stroke-width="2" stroke-dasharray="4"/>
            <circle cx="20" cy="140" r="15" fill="#fff8e1" stroke="#ff9800" stroke-width="2"/>
            <text x="20" y="145" font-size="10" font-weight="bold" fill="#d84315" text-anchor="middle">50</text>
            
            <text x="60" y="145" font-size="10" fill="#d84315">New!</text>
        </g>

        <!-- Vec View -->
        <g transform="translate(280, 100)">
            <rect x="0" y="0" width="40" height="40" fill="#fff" stroke="#333"/> <text x="20" y="25" font-size="12" text-anchor="middle">100</text>
            <rect x="40" y="0" width="40" height="40" fill="#fff" stroke="#333"/> <text x="60" y="25" font-size="12" text-anchor="middle">19</text>
            <rect x="80" y="0" width="40" height="40" fill="#fff" stroke="#333"/> <text x="100" y="25" font-size="12" text-anchor="middle">36</text>
            <rect x="120" y="0" width="40" height="40" fill="#fff" stroke="#333"/> <text x="140" y="25" font-size="12" text-anchor="middle">17</text>
            <rect x="160" y="0" width="40" height="40" fill="#fff" stroke="#333"/> <text x="180" y="25" font-size="12" text-anchor="middle">3</text>
            
            <!-- New Element -->
            <rect x="200" y="0" width="40" height="40" fill="#fff8e1" stroke="#ff9800" stroke-width="2"/> 
            <text x="220" y="25" font-size="12" font-weight="bold" fill="#d84315" text-anchor="middle">50</text>
        </g>

        <!-- Code Block -->
        <g transform="translate(680, 0)">
            <rect x="0" y="0" width="220" height="200" rx="12" fill="#f3e5f5" stroke="#9c27b0"/>
            <text x="10" y="24" font-size="12" font-weight="bold" fill="#6a1b9a">Rust Code</text>
            <line x1="0" y1="35" x2="220" y2="35" stroke="#ab47bc" stroke-dasharray="4"/>
            
            <g transform="translate(10, 50)">
                 <text x="0" y="0" font-family="monospace" font-size="10" fill="#333">self.data.push(item);</text>
                 <text x="0" y="20" font-family="monospace" font-size="10" fill="#333">let mut pos = len - 1;</text>
            </g>
        </g>
    </g>

    <!-- Arrow Down -->
    <g transform="translate(400, 270)">
        <line x1="0" y1="0" x2="0" y2="20" stroke="#ccc" stroke-width="2" marker-end="url(#arrow-grey)"/>
    </g>

    <!-- Step 2: Compare & Swap 1 -->
    <g transform="translate(50, 300)">
        <rect x="0" y="0" width="650" height="200" rx="12" fill="#ffffff" stroke="#e0e0e0"/>
        <rect x="0" y="0" width="650" height="35" rx="12" fill="#e3f2fd"/>
        <text x="20" y="24" font-size="14" font-weight="bold" fill="#1565c0">Step 2: 第一轮挑战 (50 vs 17)</text>
        <text x="250" y="24" font-size="12" fill="#555">50 &gt; 父节点 17，交换位置。</text>

        <!-- Tree View -->
        <g transform="translate(30, 60)">
             <!-- Edges -->
            <line x1="100" y1="20" x2="60" y2="60" stroke="#ccc" stroke-width="2"/>
            <line x1="100" y1="20" x2="140" y2="60" stroke="#ccc" stroke-width="2"/>
            <line x1="60" y1="60" x2="40" y2="100" stroke="#ccc" stroke-width="2"/>
            <line x1="60" y1="60" x2="80" y2="100" stroke="#ccc" stroke-width="2"/>
            <line x1="40" y1="100" x2="20" y2="140" stroke="#ccc" stroke-width="2"/>

            <!-- Nodes -->
            <circle cx="100" cy="20" r="15" fill="#fff" stroke="#333"/> <text x="100" y="25" font-size="10" text-anchor="middle">100</text>
            <circle cx="60" cy="60" r="15" fill="#fff" stroke="#333"/> <text x="60" y="65" font-size="10" text-anchor="middle">19</text>
            <circle cx="140" cy="60" r="15" fill="#fff" stroke="#333"/> <text x="140" y="65" font-size="10" text-anchor="middle">36</text>
            
            <!-- Swapped Parent -->
            <circle cx="40" cy="100" r="15" fill="#fff8e1" stroke="#ff9800" stroke-width="2"/> 
            <text x="40" y="105" font-size="10" font-weight="bold" fill="#d84315" text-anchor="middle">50</text>
            
            <circle cx="80" cy="100" r="15" fill="#fff" stroke="#333"/> <text x="80" y="105" font-size="10" text-anchor="middle">3</text>

            <!-- Swapped Child -->
            <circle cx="20" cy="140" r="15" fill="#f5f5f5" stroke="#333"/>
            <text x="20" y="145" font-size="10" fill="#666" text-anchor="middle">17</text>
            
            <path d="M55,100 L85,100" stroke="#ff9800" marker-end="url(#arrow-orange)"/>
            <text x="90" y="105" font-size="10" fill="#d84315">Up!</text>
        </g>
        
        <!-- Vec View -->
        <g transform="translate(280, 100)">
            <rect x="0" y="0" width="40" height="40" fill="#fff" stroke="#333"/> <text x="20" y="25" font-size="12" text-anchor="middle">100</text>
            <rect x="40" y="0" width="40" height="40" fill="#fff" stroke="#333"/> <text x="60" y="25" font-size="12" text-anchor="middle">19</text>
            <rect x="80" y="0" width="40" height="40" fill="#fff" stroke="#333"/> <text x="100" y="25" font-size="12" text-anchor="middle">36</text>
            
            <!-- Swapped Position -->
            <rect x="120" y="0" width="40" height="40" fill="#fff8e1" stroke="#ff9800" stroke-width="2"/> 
            <text x="140" y="25" font-size="12" font-weight="bold" fill="#d84315" text-anchor="middle">50</text>
            
            <rect x="160" y="0" width="40" height="40" fill="#fff" stroke="#333"/> <text x="180" y="25" font-size="12" text-anchor="middle">3</text>
            
            <rect x="200" y="0" width="40" height="40" fill="#f5f5f5" stroke="#333"/> 
            <text x="220" y="25" font-size="12" fill="#666" text-anchor="middle">17</text>
            
            <!-- Swap Arc -->
            <path d="M220,45 Q180,70 140,45" fill="none" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow-orange)"/>
        </g>

        <!-- Code Block -->
        <g transform="translate(680, 0)">
            <rect x="0" y="0" width="220" height="200" rx="12" fill="#f3e5f5" stroke="#9c27b0"/>
            <text x="10" y="24" font-size="12" font-weight="bold" fill="#6a1b9a">Rust Code</text>
            <line x1="0" y1="35" x2="220" y2="35" stroke="#ab47bc" stroke-dasharray="4"/>
            
            <g transform="translate(10, 50)">
                 <text x="0" y="0" font-family="monospace" font-size="10" fill="#333">while pos > 0 {</text>
                 <text x="10" y="20" font-family="monospace" font-size="10" fill="#333">let parent = (pos-1)/2;</text>
                 <text x="10" y="40" font-family="monospace" font-size="10" fill="#333">if el &lt;= data[parent] {</text>
                 <text x="20" y="60" font-family="monospace" font-size="10" fill="#666">break;</text>
                 <text x="10" y="80" font-family="monospace" font-size="10" fill="#333">}</text>
                 <text x="10" y="100" font-family="monospace" font-size="10" fill="#6a1b9a">swap(pos, parent);</text>
                 <text x="10" y="120" font-family="monospace" font-size="10" fill="#333">pos = parent;</text>
                 <text x="0" y="140" font-family="monospace" font-size="10" fill="#333">}</text>
            </g>
        </g>
    </g>

    <!-- Arrow Down -->
    <g transform="translate(400, 510)">
        <line x1="0" y1="0" x2="0" y2="20" stroke="#ccc" stroke-width="2" marker-end="url(#arrow-grey)"/>
    </g>

    <!-- Step 3: Compare & Swap 2 -->
    <g transform="translate(50, 540)">
        <rect x="0" y="0" width="650" height="200" rx="12" fill="#ffffff" stroke="#e0e0e0"/>
        <rect x="0" y="0" width="650" height="35" rx="12" fill="#e3f2fd"/>
        <text x="20" y="24" font-size="14" font-weight="bold" fill="#1565c0">Step 3: 第二轮挑战 (50 vs 19)</text>
        <text x="250" y="24" font-size="12" fill="#555">50 &gt; 父节点 19，再次交换。此时 50 &lt; 100，停止上浮。</text>

         <!-- Tree View -->
        <g transform="translate(30, 60)">
             <!-- Edges -->
            <line x1="100" y1="20" x2="60" y2="60" stroke="#ccc" stroke-width="2"/>
            <line x1="100" y1="20" x2="140" y2="60" stroke="#ccc" stroke-width="2"/>
            <line x1="60" y1="60" x2="40" y2="100" stroke="#ccc" stroke-width="2"/>
            <line x1="60" y1="60" x2="80" y2="100" stroke="#ccc" stroke-width="2"/>
            <line x1="40" y1="100" x2="20" y2="140" stroke="#ccc" stroke-width="2"/>

            <!-- Nodes -->
            <circle cx="100" cy="20" r="15" fill="#fff" stroke="#333"/> <text x="100" y="25" font-size="10" text-anchor="middle">100</text>
            
            <!-- Swapped Parent -->
            <circle cx="60" cy="60" r="15" fill="#fff8e1" stroke="#ff9800" stroke-width="2"/> 
            <text x="60" y="65" font-size="10" font-weight="bold" fill="#d84315" text-anchor="middle">50</text>
            
            <circle cx="140" cy="60" r="15" fill="#fff" stroke="#333"/> <text x="140" y="65" font-size="10" text-anchor="middle">36</text>
            
            <!-- Swapped Child -->
            <circle cx="40" cy="100" r="15" fill="#f5f5f5" stroke="#333"/> 
            <text x="40" y="105" font-size="10" fill="#666" text-anchor="middle">19</text>
            
            <circle cx="80" cy="100" r="15" fill="#fff" stroke="#333"/> <text x="80" y="105" font-size="10" text-anchor="middle">3</text>
            <circle cx="20" cy="140" r="15" fill="#f5f5f5" stroke="#333"/> <text x="20" y="145" font-size="10" fill="#666" text-anchor="middle">17</text>
            
            <text x="90" y="65" font-size="10" fill="#2e7d32">Done!</text>
        </g>

        <!-- Vec View -->
        <g transform="translate(280, 100)">
            <rect x="0" y="0" width="40" height="40" fill="#fff" stroke="#333"/> <text x="20" y="25" font-size="12" text-anchor="middle">100</text>
            
            <!-- Swapped Position -->
            <rect x="40" y="0" width="40" height="40" fill="#fff8e1" stroke="#ff9800" stroke-width="2"/> 
            <text x="60" y="25" font-size="12" font-weight="bold" fill="#d84315" text-anchor="middle">50</text>
            
            <rect x="80" y="0" width="40" height="40" fill="#fff" stroke="#333"/> <text x="100" y="25" font-size="12" text-anchor="middle">36</text>
            
            <rect x="120" y="0" width="40" height="40" fill="#f5f5f5" stroke="#333"/> 
            <text x="140" y="25" font-size="12" fill="#666" text-anchor="middle">19</text>
            
            <rect x="160" y="0" width="40" height="40" fill="#fff" stroke="#333"/> <text x="180" y="25" font-size="12" text-anchor="middle">3</text>
            <rect x="200" y="0" width="40" height="40" fill="#f5f5f5" stroke="#333"/> <text x="220" y="25" font-size="12" fill="#666" text-anchor="middle">17</text>

            <!-- Swap Arc -->
            <path d="M140,45 Q100,70 60,45" fill="none" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow-orange)"/>
        </g>
        
        <!-- Code Block -->
        <g transform="translate(680, 0)">
            <rect x="0" y="0" width="220" height="200" rx="12" fill="#f3e5f5" stroke="#9c27b0"/>
            <text x="10" y="24" font-size="12" font-weight="bold" fill="#6a1b9a">Rust Code</text>
            <line x1="0" y1="35" x2="220" y2="35" stroke="#ab47bc" stroke-dasharray="4"/>
            
            <g transform="translate(10, 50)">
                 <text x="0" y="0" font-family="monospace" font-size="10" fill="#666">// Continue Loop...</text>
                 <text x="0" y="20" font-family="monospace" font-size="10" fill="#6a1b9a">swap(pos, parent);</text>
                 <text x="0" y="40" font-family="monospace" font-size="10" fill="#333">pos = parent;</text>
            </g>
        </g>
    </g>

    <defs>
        <marker id="arrow-grey" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#ccc" />
        </marker>
        <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#ff9800" />
        </marker>
    </defs>
</svg>