<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" style="background:#f8f9fa; font-family:'JetBrains Mono', monospace;">
    <!-- Background -->
    <rect width="800" height="400" fill="#f8f9fa"/>
    <text x="400" y="30" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">BinaryHeap Pop: 下沉 (Sift Down)</text>

    <!-- Step 1: Swap & Remove -->
    <g transform="translate(50, 60)">
        <rect x="0" y="0" width="320" height="35" rx="8" fill="#ffebee"/>
        <text x="160" y="24" font-size="14" font-weight="bold" fill="#c62828" text-anchor="middle">Step 1: 尾部元素移至堆顶</text>
        
        <g transform="translate(0, 40)">
            <!-- Edges -->
            <line x1="160" y1="20" x2="80" y2="70" stroke="#ccc" stroke-width="2"/>
            <line x1="160" y1="20" x2="240" y2="70" stroke="#ccc" stroke-width="2"/>
            
            <line x1="80" y1="70" x2="40" y2="120" stroke="#ccc" stroke-width="2"/>
            <line x1="80" y1="70" x2="120" y2="120" stroke="#ccc" stroke-width="2"/>
            <line x1="240" y1="70" x2="200" y2="120" stroke="#ccc" stroke-width="2"/>
            <line x1="240" y1="70" x2="280" y2="120" stroke="#ccc" stroke-width="2"/>

            <!-- Nodes -->
            <!-- Root (The new weak node) -->
            <circle cx="160" cy="20" r="18" fill="#ffebee" stroke="#d32f2f" stroke-width="3"/>
            <text x="160" y="25" font-size="12" font-weight="bold" fill="#d32f2f" text-anchor="middle">17</text>
            <text x="190" y="20" font-size="10" fill="#d32f2f" text-anchor="start">Unstable</text>

            <!-- Children -->
            <circle cx="80" cy="70" r="18" fill="#fff" stroke="#333"/>
            <text x="80" y="75" font-size="12" text-anchor="middle">50</text>

            <circle cx="240" cy="70" r="18" fill="#fff" stroke="#333"/>
            <text x="240" y="75" font-size="12" text-anchor="middle">36</text>

            <circle cx="40" cy="120" r="18" fill="#fff" stroke="#333"/>
            <text x="40" y="125" font-size="12" text-anchor="middle">19</text>

            <circle cx="120" cy="120" r="18" fill="#fff" stroke="#333"/>
            <text x="120" y="125" font-size="12" text-anchor="middle">3</text>
            
            <circle cx="200" cy="120" r="18" fill="#fff" stroke="#333"/>
            <text x="200" y="125" font-size="12" text-anchor="middle">25</text>
            
            <circle cx="280" cy="120" r="18" fill="#fff" stroke="#333"/>
            <text x="280" y="125" font-size="12" text-anchor="middle">1</text>

            <!-- Comparison -->
            <path d="M145,35 L95,60" stroke="#d32f2f" stroke-dasharray="4" marker-end="url(#arrow-red)"/>
            <text x="100" y="50" font-size="10" fill="#d32f2f">Swap (17 &lt; 50)</text>
        </g>
    </g>

    <!-- Arrow Transition -->
    <g transform="translate(380, 180)">
        <path d="M0,0 L30,0" stroke="#333" stroke-width="4" marker-end="url(#arrow-black)"/>
        <text x="15" y="-10" font-size="12" text-anchor="middle" fill="#333">Sift Down</text>
    </g>

    <!-- Step 2: Final Result -->
    <g transform="translate(430, 60)">
        <rect x="0" y="0" width="320" height="35" rx="8" fill="#e8f5e9"/>
        <text x="160" y="24" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">Step 2: 恢复堆性质</text>
        
         <g transform="translate(0, 40)">
            <!-- Edges -->
            <line x1="160" y1="20" x2="80" y2="70" stroke="#ccc" stroke-width="2"/>
            <line x1="160" y1="20" x2="240" y2="70" stroke="#ccc" stroke-width="2"/>
            
            <line x1="80" y1="70" x2="40" y2="120" stroke="#ccc" stroke-width="2"/>
            <line x1="80" y1="70" x2="120" y2="120" stroke="#ccc" stroke-width="2"/>
            <line x1="240" y1="70" x2="200" y2="120" stroke="#ccc" stroke-width="2"/>
            <line x1="240" y1="70" x2="280" y2="120" stroke="#ccc" stroke-width="2"/>

            <!-- Nodes -->
            <!-- New Root -->
            <circle cx="160" cy="20" r="18" fill="#fff8e1" stroke="#ff9800" stroke-width="3"/>
            <text x="160" y="25" font-size="12" font-weight="bold" fill="#e65100" text-anchor="middle">50</text>

            <!-- Level 1 -->
            <circle cx="80" cy="70" r="18" fill="#fff" stroke="#333"/>
            <text x="80" y="75" font-size="12" text-anchor="middle">19</text>

            <circle cx="240" cy="70" r="18" fill="#fff" stroke="#333"/>
            <text x="240" y="75" font-size="12" text-anchor="middle">36</text>

            <!-- Level 2 -->
            <!-- The Sunk Node -->
            <circle cx="40" cy="120" r="18" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3"/>
            <text x="40" y="125" font-size="12" font-weight="bold" fill="#1b5e20" text-anchor="middle">17</text>
            <text x="10" y="125" font-size="10" fill="#2e7d32" text-anchor="end">OK</text>

            <circle cx="120" cy="120" r="18" fill="#fff" stroke="#333"/>
            <text x="120" y="125" font-size="12" text-anchor="middle">3</text>
            
            <circle cx="200" cy="120" r="18" fill="#fff" stroke="#333"/>
            <text x="200" y="125" font-size="12" text-anchor="middle">25</text>
            
            <circle cx="280" cy="120" r="18" fill="#fff" stroke="#333"/>
            <text x="280" y="125" font-size="12" text-anchor="middle">1</text>
        </g>
    </g>

    <!-- Legend -->
    <g transform="translate(250, 320)">
        <rect x="0" y="0" width="300" height="60" rx="8" fill="#fff" stroke="#ddd"/>
        <text x="15" y="20" font-size="12" font-weight="bold" fill="#333">流程解析:</text>
        <text x="15" y="40" font-size="11" fill="#555">1. 17 < 50 (Max Child) -> Swap</text>
        <text x="15" y="55" font-size="11" fill="#555">2. 17 < 19 (Max Child) -> Swap</text>
        <text x="180" y="40" font-size="11" fill="#555">3. 17 > Children -> Stop</text>
    </g>

    <defs>
        <marker id="arrow-black" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#333" />
        </marker>
        <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#d32f2f" />
        </marker>
    </defs>
</svg>