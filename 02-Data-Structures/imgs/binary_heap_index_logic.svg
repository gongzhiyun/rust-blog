<?xml version="1.0" encoding="UTF-8"?>
<svg width="840" height="1050" viewBox="0 0 840 1050" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <!-- Global Definitions -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orientation="auto">
      <path d="M0,0 L0,10 L9,5 Z" fill="#ff9800" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="840" height="1050" fill="#f8f9fa" rx="15"/>
  
  <!-- Title -->
  <text x="420" y="45" font-family="JetBrains Mono, monospace" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">逻辑视图：从二叉树到数组的映射</text>

  <!-- 1. Code Section -->
  <g transform="translate(50, 80)">
    <rect width="740" height="150" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
    <path d="M0 12 Q0 0 12 0 H728 Q740 0 740 12 V35 H0 Z" fill="#f3e5f5"/>
    <text x="370" y="22" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#6a1b9a" text-anchor="middle">演示代码</text>
    <g transform="translate(30, 60)">
      <text font-family="JetBrains Mono, monospace" font-size="13" line-height="1.5em">
        <tspan x="0" dy="0"><tspan fill="#6a1b9a">fn</tspan> <tspan fill="#2e7d32">main</tspan><tspan fill="#333">() {</tspan></tspan>
        <tspan x="20" dy="1.5em"><tspan fill="#6a1b9a">let</tspan> <tspan fill="#333">heap = </tspan><tspan fill="#1565c0">BinaryHeap</tspan><tspan fill="#333">::</tspan><tspan fill="#2e7d32">from</tspan><tspan fill="#333">(</tspan><tspan fill="#6a1b9a">vec!</tspan><tspan fill="#333">[</tspan><tspan fill="#f57c00">100</tspan><tspan fill="#333">, </tspan><tspan fill="#f57c00">19</tspan><tspan fill="#333">, </tspan><tspan fill="#f57c00">36</tspan><tspan fill="#333">, </tspan><tspan fill="#f57c00">17</tspan><tspan fill="#333">, </tspan><tspan fill="#f57c00">3</tspan><tspan fill="#333">, </tspan><tspan fill="#f57c00">25</tspan><tspan fill="#333">, </tspan><tspan fill="#f57c00">1</tspan><tspan fill="#333">]);</tspan></tspan>
        <tspan x="20" dy="1.5em"><tspan fill="#78909c">// 数据在内存中连续存储，逻辑上呈现为完全二叉树</tspan></tspan>
        <tspan x="0" dy="1.5em"><tspan fill="#333">}</tspan></tspan>
      </text>
    </g>
  </g>

  <!-- 2. Memory Layout Section -->
  <g transform="translate(50, 275)">
    <rect x="-10" y="-15" width="115" height="25" rx="12.5" fill="#f3e5f5" opacity="0.5"/>
    <text x="0" y="2" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#6a1b9a">实际内存布局</text>
    
    <g transform="translate(0, 20)">
      <!-- Stack (Consistent with binary_heap_physical_layout.svg) -->
      <g transform="translate(0, 0)">
        <rect width="250" height="150" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
        <path d="M0 12 Q0 0 12 0 H238 Q250 0 250 12 V35 H0 Z" fill="#e3f2fd"/>
        <text x="125" y="22" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="middle">Stack</text>
        <g transform="translate(15, 45)">
          <rect width="220" height="28" rx="4" fill="#fff8e1" stroke="#ff9800" stroke-width="1.5"/>
          <text x="10" y="18" font-family="JetBrains Mono, monospace" font-size="11" fill="#333">ptr</text>
          <text x="210" y="18" font-family="JetBrains Mono, monospace" font-size="11" fill="#333" text-anchor="end">0x500</text>
          <circle cx="220" cy="14" r="3" fill="#ff9800"/>
          
          <rect y="33" width="220" height="28" rx="4" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
          <text x="10" y="51" font-family="JetBrains Mono, monospace" font-size="11" fill="#333">cap</text>
          <text x="210" y="51" font-family="JetBrains Mono, monospace" font-size="11" fill="#333" text-anchor="end">8</text>
          
          <rect y="66" width="220" height="28" rx="4" fill="#fafafa" stroke="#ff9800" stroke-width="1.5"/>
          <text x="10" y="84" font-family="JetBrains Mono, monospace" font-size="11" fill="#333">len</text>
          <text x="210" y="84" font-family="JetBrains Mono, monospace" font-size="11" fill="#333" text-anchor="end">7</text>
        </g>
      </g>

      <!-- Heap (Consistent with binary_heap_physical_layout.svg) -->
      <g transform="translate(280, 0)">
        <rect width="460" height="150" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
        <path d="M0 12 Q0 0 12 0 H448 Q460 0 460 12 V35 H0 Z" fill="#e8f5e9"/>
        <text x="230" y="22" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#2e7d32" text-anchor="middle">Heap</text>
        
        <g transform="translate(12.5, 60)">
          <!-- Row 1 -->
          <g transform="translate(0, 0)">
            <rect width="50" height="40" rx="4" fill="#ffffff" stroke="#4caf50" stroke-width="2.5"/>
            <text x="25" y="25" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">100</text>
            <text x="25" y="55" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="middle">[0]</text>
          </g>
          <g transform="translate(55, 0)">
            <rect width="50" height="40" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
            <text x="25" y="25" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">19</text>
            <text x="25" y="55" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="middle">[1]</text>
          </g>
          <g transform="translate(110, 0)">
            <rect width="50" height="40" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
            <text x="25" y="25" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">36</text>
            <text x="25" y="55" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="middle">[2]</text>
          </g>
          <g transform="translate(165, 0)">
            <rect width="50" height="40" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
            <text x="25" y="25" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">17</text>
            <text x="25" y="55" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="middle">[3]</text>
          </g>
          <g transform="translate(220, 0)">
            <rect width="50" height="40" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
            <text x="25" y="25" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">3</text>
            <text x="25" y="55" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="middle">[4]</text>
          </g>
          <g transform="translate(275, 0)">
            <rect width="50" height="40" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
            <text x="25" y="25" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">25</text>
            <text x="25" y="55" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="middle">[5]</text>
          </g>
          <g transform="translate(330, 0)">
            <rect width="50" height="40" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
            <text x="25" y="25" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">1</text>
            <text x="25" y="55" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="middle">[6]</text>
          </g>
          <g transform="translate(385, 0)">
            <rect width="50" height="40" rx="4" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4 2"/>
            <text x="25" y="25" font-family="JetBrains Mono, monospace" font-size="10" fill="#bdbdbd" text-anchor="middle">Spare</text>
            <text x="25" y="55" font-family="JetBrains Mono, monospace" font-size="10" fill="#bdbdbd" text-anchor="middle">[7]</text>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- 3. Logical Tree Section -->
  <g transform="translate(50, 495)">
    <rect x="-10" y="-15" width="140" height="25" rx="12.5" fill="#f3e5f5" opacity="0.5"/>
    <text x="0" y="2" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#6a1b9a">映射的逻辑二叉树</text>
    
    <g transform="translate(0, 20)">
      <rect width="740" height="300" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
      <path d="M0 12 Q0 0 12 0 H728 Q740 0 740 12 V35 H0 Z" fill="#e3f2fd"/>
      <text x="370" y="22" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="middle">Logical Tree (完全二叉树结构)</text>
      
      <!-- Tree Nodes -->
      <g transform="translate(370, 60)">
        <!-- Root -->
        <circle cx="0" cy="30" r="22" fill="#ffffff" stroke="#1565c0" stroke-width="2.5"/>
        <text y="35" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">100</text>
        <text y="-5" font-family="JetBrains Mono, monospace" font-size="10" fill="#1565c0" text-anchor="middle">idx: 0</text>

        <!-- Lines Root to L1 -->
        <line x1="-15" y1="50" x2="-85" y2="90" stroke="#e0e0e0" stroke-width="2"/>
        <line x1="15" y1="50" x2="85" y2="90" stroke="#e0e0e0" stroke-width="2"/>

        <!-- Level 1 -->
        <g transform="translate(-100, 110)">
          <circle r="22" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
          <text y="5" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">19</text>
          <text y="-30" font-family="JetBrains Mono, monospace" font-size="10" fill="#1565c0" text-anchor="middle">idx: 1</text>
          
          <!-- Lines L1 to L2 -->
          <line x1="-10" y1="20" x2="-40" y2="60" stroke="#e0e0e0" stroke-width="1.5"/>
          <line x1="10" y1="20" x2="40" y2="60" stroke="#e0e0e0" stroke-width="1.5"/>

          <!-- Level 2 Children -->
          <g transform="translate(-50, 80)">
            <circle r="18" fill="#ffffff" stroke="#1565c0" stroke-width="1.5"/>
            <text y="5" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">17</text>
            <text y="30" font-family="JetBrains Mono, monospace" font-size="9" fill="#1565c0" text-anchor="middle">idx: 3</text>
          </g>
          <g transform="translate(50, 80)">
            <circle r="18" fill="#ffffff" stroke="#1565c0" stroke-width="1.5"/>
            <text y="5" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">3</text>
            <text y="30" font-family="JetBrains Mono, monospace" font-size="9" fill="#1565c0" text-anchor="middle">idx: 4</text>
          </g>
        </g>

        <g transform="translate(100, 110)">
          <circle r="22" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
          <text y="5" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">36</text>
          <text y="-30" font-family="JetBrains Mono, monospace" font-size="10" fill="#1565c0" text-anchor="middle">idx: 2</text>

          <!-- Lines L1 to L2 -->
          <line x1="-10" y1="20" x2="-40" y2="60" stroke="#e0e0e0" stroke-width="1.5"/>
          <line x1="10" y1="20" x2="40" y2="60" stroke="#e0e0e0" stroke-width="1.5"/>

          <!-- Level 2 Children -->
          <g transform="translate(-50, 80)">
            <circle r="18" fill="#ffffff" stroke="#1565c0" stroke-width="1.5"/>
            <text y="5" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">25</text>
            <text y="30" font-family="JetBrains Mono, monospace" font-size="9" fill="#1565c0" text-anchor="middle">idx: 5</text>
          </g>
          <g transform="translate(50, 80)">
            <circle r="18" fill="#ffffff" stroke="#1565c0" stroke-width="1.5"/>
            <text y="5" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">1</text>
            <text y="30" font-family="JetBrains Mono, monospace" font-size="9" fill="#1565c0" text-anchor="middle">idx: 6</text>
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- 4. Formulas Section -->
  <g transform="translate(50, 825)">
    <rect width="740" height="180" rx="12" fill="#fff9c4" opacity="0.3" stroke="#fbc02d" stroke-width="1"/>
    <text x="370" y="25" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#f57c00" text-anchor="middle">💡 索引计算公式</text>
    
    <g transform="translate(60, 60)">
      <!-- Left Child -->
      <rect width="180" height="80" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
      <text x="90" y="25" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">Left Child</text>
      <text x="90" y="55" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#1565c0" text-anchor="middle">2 * i + 1</text>
      
      <!-- Right Child -->
      <g transform="translate(220, 0)">
        <rect width="180" height="80" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
        <text x="90" y="25" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">Right Child</text>
        <text x="90" y="55" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#1565c0" text-anchor="middle">2 * i + 2</text>
      </g>

      <!-- Parent -->
      <g transform="translate(440, 0)">
        <rect width="180" height="80" rx="8" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
        <text x="90" y="25" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">Parent Node</text>
        <text x="90" y="55" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#1565c0" text-anchor="middle">(i - 1) / 2</text>
      </g>
    </g>
    <text x="370" y="165" font-family="JetBrains Mono, monospace" font-size="11" fill="#78909c" text-anchor="middle">* 在 Rust 源码中，这些公式通过 bitwise 移位操作进行高度优化</text>
  </g>

  <!-- Pointer Line (Placed at the end to ensure it's on top) -->
  <path d="M285,354 L330,355" stroke="#ff9800" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
</svg>
