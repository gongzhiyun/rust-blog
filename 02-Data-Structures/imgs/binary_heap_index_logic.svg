<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <rect width="800" height="500" fill="#f8f9fa" rx="15"/>
  <text x="400" y="40" font-family="JetBrains Mono, monospace" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">逻辑视图：从二叉树到数组的映射</text>

  <!-- Tree Structure -->
  <g transform="translate(0, 80)">
    <text x="400" y="20" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#1565c0" text-anchor="middle">逻辑二叉树 (Logical Tree)</text>
    
    <!-- Level 0 -->
    <circle cx="400" cy="70" r="25" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
    <text x="400" y="75" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">20</text>
    <text x="400" y="35" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="middle">i=0</text>

    <!-- Lines L0 to L1 -->
    <line x1="385" y1="90" x2="315" y2="140" stroke="#e0e0e0" stroke-width="2"/>
    <line x1="415" y1="90" x2="485" y2="140" stroke="#e0e0e0" stroke-width="2"/>

    <!-- Level 1 -->
    <circle cx="300" cy="160" r="25" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
    <text x="300" y="165" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">15</text>
    <text x="300" y="125" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="middle">i=1</text>

    <circle cx="500" cy="160" r="25" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
    <text x="500" y="165" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">10</text>
    <text x="500" y="125" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="middle">i=2</text>

    <!-- Lines L1 to L2 -->
    <line x1="285" y1="180" x2="240" y2="230" stroke="#e0e0e0" stroke-width="2" stroke-dasharray="4 2"/>
    <line x1="315" y1="180" x2="360" y2="230" stroke="#e0e0e0" stroke-width="2" stroke-dasharray="4 2"/>

    <!-- Level 2 (Placeholders) -->
    <circle cx="220" cy="250" r="20" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4 2"/>
    <text x="220" y="220" font-family="JetBrains Mono, monospace" font-size="9" fill="#9e9e9e" text-anchor="middle">i=3</text>
    <circle cx="380" cy="250" r="20" fill="#f5f5f5" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4 2"/>
    <text x="380" y="220" font-family="JetBrains Mono, monospace" font-size="9" fill="#9e9e9e" text-anchor="middle">i=4</text>
  </g>

  <!-- Array Structure -->
  <g transform="translate(100, 380)">
    <text x="300" y="-10" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#2e7d32" text-anchor="middle">物理数组 (Physical Array / Vec)</text>
    <g>
      <rect x="0" y="0" width="80" height="50" rx="4" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
      <text x="40" y="30" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">20</text>
      <text x="40" y="65" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="middle">[0]</text>

      <rect x="80" y="0" width="80" height="50" rx="4" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
      <text x="120" y="30" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">15</text>
      <text x="120" y="65" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="middle">[1]</text>

      <rect x="160" y="0" width="80" height="50" rx="4" fill="#ffffff" stroke="#4caf50" stroke-width="2"/>
      <text x="200" y="30" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#333" text-anchor="middle">10</text>
      <text x="200" y="65" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" text-anchor="middle">[2]</text>

      <rect x="240" y="0" width="80" height="50" rx="4" fill="#f5f5f5" stroke="#bdbdbd" stroke-dasharray="4 2"/>
      <text x="280" y="65" font-family="JetBrains Mono, monospace" font-size="10" fill="#9e9e9e" text-anchor="middle">[3]</text>
    </g>
  </g>

  <!-- Formulas -->
  <g transform="translate(500, 350)">
    <rect width="250" height="120" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="125" y="25" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#e65100" text-anchor="middle">索引计算公式</text>
    <text x="20" y="55" font-family="JetBrains Mono, monospace" font-size="12" fill="#333">Left:   2 * i + 1</text>
    <text x="20" y="80" font-family="JetBrains Mono, monospace" font-size="12" fill="#333">Right:  2 * i + 2</text>
    <text x="20" y="105" font-family="JetBrains Mono, monospace" font-size="12" fill="#333">Parent: (i - 1) / 2</text>
  </g>

  <!-- Connection Arrows (Mapping) -->
  <path d="M400 185 C400 250, 140 280, 140 375" stroke="#ff9800" stroke-width="1" stroke-dasharray="4 4" fill="none" marker-end="url(#arrow_small)"/>
  <path d="M300 265 C300 300, 220 320, 220 375" stroke="#ff9800" stroke-width="1" stroke-dasharray="4 4" fill="none" marker-end="url(#arrow_small)"/>

  <defs>
    <marker id="arrow_small" markerWidth="6" markerHeight="6" refX="5" refY="3" orientation="auto">
      <path d="M0,0 L0,6 L5,3 Z" fill="#ff9800" />
    </marker>
  </defs>
</svg>
