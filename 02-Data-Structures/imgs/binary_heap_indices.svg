<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" style="background:#f8f9fa; font-family:'JetBrains Mono', monospace;">
    <!-- Background & Title -->
    <rect width="800" height="400" fill="#f8f9fa"/>
    <text x="400" y="30" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">BinaryHeap: 索引算术 (Index Arithmetic)</text>

    <!-- Formula Box (Now Code Block) -->
    <g transform="translate(550, 60)">
        <rect x="0" y="0" width="220" height="35" rx="8" fill="#f3e5f5"/>
        <text x="110" y="24" font-size="14" font-weight="bold" fill="#6a1b9a" text-anchor="middle">Rust Code</text>
        
        <g transform="translate(0, 45)">
            <rect x="0" y="0" width="220" height="250" rx="4" fill="#f8f9fa" stroke="#9c27b0" stroke-dasharray="4 2"/>
            
            <text x="10" y="20" font-family="monospace" font-size="10" fill="#6a1b9a">fn parent(i: usize) {</text>
            <text x="20" y="35" font-family="monospace" font-size="10" fill="#333">(i - 1) / 2</text>
            <text x="10" y="50" font-family="monospace" font-size="10" fill="#333">}</text>
            
            <line x1="10" y1="65" x2="210" y2="65" stroke="#ddd" stroke-width="1"/>

            <text x="10" y="85" font-family="monospace" font-size="10" fill="#6a1b9a">fn left(i: usize) {</text>
            <text x="20" y="100" font-family="monospace" font-size="10" fill="#333">2 * i + 1</text>
            <text x="10" y="115" font-family="monospace" font-size="10" fill="#333">}</text>

            <line x1="10" y1="130" x2="210" y2="130" stroke="#ddd" stroke-width="1"/>

            <text x="10" y="150" font-family="monospace" font-size="10" fill="#6a1b9a">fn right(i: usize) {</text>
            <text x="20" y="165" font-family="monospace" font-size="10" fill="#333">2 * i + 2</text>
            <text x="10" y="180" font-family="monospace" font-size="10" fill="#333">}</text>
        </g>
    </g>

    <!-- Visual Array Representation -->
    <g transform="translate(50, 160)">
        <text x="0" y="-10" font-size="14" font-weight="bold" fill="#333">Vec Storage:</text>
        
        <!-- Array Cells -->
        <g transform="translate(0, 0)">
            <!-- Index 0 -->
            <rect x="0" y="0" width="60" height="60" fill="#fff" stroke="#333"/>
            <text x="30" y="35" font-size="16" font-weight="bold" text-anchor="middle">100</text>
            <text x="30" y="75" font-size="12" fill="#666">[0]</text>
            
            <!-- Index 1 -->
            <rect x="60" y="0" width="60" height="60" fill="#e8f5e9" stroke="#333"/>
            <text x="90" y="35" font-size="16" font-weight="bold" text-anchor="middle">19</text>
            <text x="90" y="75" font-size="12" fill="#666">[1]</text>
            
            <!-- Index 2 -->
            <rect x="120" y="0" width="60" height="60" fill="#e8f5e9" stroke="#333"/>
            <text x="150" y="35" font-size="16" font-weight="bold" text-anchor="middle">36</text>
            <text x="150" y="75" font-size="12" fill="#666">[2]</text>
            
            <!-- Index 3 -->
            <rect x="180" y="0" width="60" height="60" fill="#fff3e0" stroke="#333"/>
            <text x="210" y="35" font-size="16" font-weight="bold" text-anchor="middle">17</text>
            <text x="210" y="75" font-size="12" fill="#666">[3]</text>
            
            <!-- Index 4 -->
            <rect x="240" y="0" width="60" height="60" fill="#fff3e0" stroke="#333"/>
            <text x="270" y="35" font-size="16" font-weight="bold" text-anchor="middle">3</text>
            <text x="270" y="75" font-size="12" fill="#666">[4]</text>
            
            <!-- Index 5 -->
            <rect x="300" y="0" width="60" height="60" fill="#fff3e0" stroke="#333"/>
            <text x="330" y="35" font-size="16" font-weight="bold" text-anchor="middle">25</text>
            <text x="330" y="75" font-size="12" fill="#666">[5]</text>
            
            <!-- Index 6 -->
            <rect x="360" y="0" width="60" height="60" fill="#fff3e0" stroke="#333"/>
            <text x="390" y="35" font-size="16" font-weight="bold" text-anchor="middle">1</text>
            <text x="390" y="75" font-size="12" fill="#666">[6]</text>
        </g>

        <!-- Arrows showing relationships -->
        <!-- Parent 0 -> Children 1, 2 -->
        <path d="M30,0 C30,-30 90,-30 90,0" fill="none" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow-green)"/>
        <path d="M30,0 C30,-40 150,-40 150,0" fill="none" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow-green)"/>
        
        <!-- Parent 1 -> Children 3, 4 -->
        <path d="M90,60 C90,100 210,100 210,60" fill="none" stroke="#ef6c00" stroke-width="2" marker-end="url(#arrow-orange)"/>
        <path d="M90,60 C90,110 270,110 270,60" fill="none" stroke="#ef6c00" stroke-width="2" marker-end="url(#arrow-orange)"/>

         <!-- Parent 2 -> Children 5, 6 -->
        <path d="M150,60 C150,120 330,120 330,60" fill="none" stroke="#ef6c00" stroke-width="2" marker-end="url(#arrow-orange)"/>
        <path d="M150,60 C150,130 390,130 390,60" fill="none" stroke="#ef6c00" stroke-width="2" marker-end="url(#arrow-orange)"/>
    </g>
    
    <!-- Legend -->
    <g transform="translate(300, 320)">
        <text x="0" y="0" font-size="14" font-weight="bold" fill="#333">图例说明:</text>
        
        <circle cx="10" cy="25" r="5" fill="#2e7d32"/>
        <text x="25" y="30" font-size="12" fill="#333">Layer 0 -> Layer 1</text>
        <text x="25" y="45" font-size="10" fill="#666">0 -> 1 (Left), 2 (Right)</text>

        <circle cx="150" cy="25" r="5" fill="#ef6c00"/>
        <text x="165" y="30" font-size="12" fill="#333">Layer 1 -> Layer 2</text>
        <text x="165" y="45" font-size="10" fill="#666">1 -> 3, 4 | 2 -> 5, 6</text>
    </g>

    <defs>
        <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32" />
        </marker>
        <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#ef6c00" />
        </marker>
    </defs>
</svg>