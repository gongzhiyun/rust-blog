<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
<rect width="800" height="450" fill="#f8f9fa" rx="15"/>
<g transform="translate(40, 30)">
<rect width="720" height="130" rx="12" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
<rect width="720" height="35" rx="12" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1"/>
<path d="M0 35 h720" stroke="#9c27b0" stroke-width="1" fill="none"/>
<text x="20" y="23" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#6a1b9a">演示代码</text>
<text x="30" y="65" font-family="JetBrains Mono, monospace" font-size="13" fill="#333333">
<tspan x="30" dy="0"><tspan fill="#6a1b9a">fn</tspan> <tspan fill="#2e7d32">main</tspan>() {</tspan>
<tspan x="50" dy="1.5em"><tspan fill="#6a1b9a">let</tspan> family = <tspan fill="#f57c00">"👨‍👩‍👧‍👦"</tspan>;</tspan>
<tspan x="50" dy="1.5em"><tspan fill="#6a1b9a">let</tspan> count = family.<tspan fill="#2e7d32">chars</tspan>().<tspan fill="#2e7d32">count</tspan>(); <tspan fill="#78909c">// 结果是 7</tspan></tspan>
<tspan x="30" dy="1.5em">}</tspan>
</text>
</g>
<g transform="translate(40, 180)">
<rect width="720" height="220" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
<rect width="720" height="35" rx="12" fill="#fff3e0" stroke="#ffb74d" stroke-width="1"/>
<text x="20" y="24" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#e65100">逻辑差异：Unicode 标量值 vs 用户感知字符</text>
<g transform="translate(40, 60)">
<text x="0" y="15" font-family="JetBrains Mono, monospace" font-size="12" fill="#333333">字形 (Grapheme Cluster): 👨‍👩‍👧‍👦</text>
<rect x="0" y="25" width="640" height="50" rx="8" fill="#fff8e1" stroke="#ff9800" stroke-dasharray="4 2"/>
<g transform="translate(10, 35)">
<rect width="70" height="30" rx="4" fill="#ffffff" stroke="#e0e0e0"/>
<text x="35" y="20" text-anchor="middle" font-size="14">👨</text>
<text x="85" y="20" text-anchor="middle" font-size="14">+</text>
<rect x="100" width="70" height="30" rx="4" fill="#ffffff" stroke="#e0e0e0"/>
<text x="135" y="20" text-anchor="middle" font-size="10">ZWJ</text>
<text x="185" y="20" text-anchor="middle" font-size="14">+</text>
<rect x="200" width="70" height="30" rx="4" fill="#ffffff" stroke="#e0e0e0"/>
<text x="235" y="20" text-anchor="middle" font-size="14">👩</text>
<text x="285" y="20" text-anchor="middle" font-size="14">+</text>
<rect x="300" width="70" height="30" rx="4" fill="#ffffff" stroke="#e0e0e0"/>
<text x="335" y="20" text-anchor="middle" font-size="10">ZWJ</text>
<text x="385" y="20" text-anchor="middle" font-size="14">+</text>
<rect x="400" width="70" height="30" rx="4" fill="#ffffff" stroke="#e0e0e0"/>
<text x="435" y="20" text-anchor="middle" font-size="14">👧</text>
<text x="485" y="20" text-anchor="middle" font-size="14">+</text>
<text x="520" y="20" font-size="14">...</text>
</g>
</g>
<g transform="translate(40, 150)">
<path d="M0 0 L640 0" stroke="#ff9800" stroke-width="2" marker-end="url(#arrow)"/>
<text x="320" y="25" text-anchor="middle" font-size="12" fill="#e65100">Rust 的 char 类型仅代表其中【每一个】独立的 Unicode 标量值</text>
<text x="320" y="45" text-anchor="middle" font-size="11" fill="#78909c">这意味着一个看似简单的 Emoji 可能是由多个 char 拼接而成的</text>
</g>
</g>
<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#ff9800" />
</marker>
</defs>
</svg>
