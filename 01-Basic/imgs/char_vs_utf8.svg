<text x="155" y="45" text-anchor="middle" font-size="10">0x00</text>
</g>
<g transform="translate(400, 50)">
<text x="0" y="15" font-family="JetBrains Mono, monospace" font-size="12" fill="#333333">UTF-8 (1 字节)</text>
<rect x="0" y="25" width="40" height="30" rx="4" fill="#e8f5e9" stroke="#4caf50"/>
