<path d="M0 30 h720" stroke="#9c27b0" stroke-width="1" fill="none"/>
<text x="20" y="20" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#6a1b9a">演示代码</text>
<text x="20" y="55" font-family="JetBrains Mono, monospace" font-size="13" fill="#333333">
<tspan x="20" dy="0"><tspan fill="#6a1b9a">let</tspan> c = <tspan fill="#f57c00">'A'</tspan>; <tspan fill="#78909c">// char</tspan></tspan>
<tspan x="20" dy="1.5em"><tspan fill="#6a1b9a">let</tspan> s = <tspan fill="#f57c00">"A"</tspan>; <tspan fill="#78909c">// &amp;str (UTF-8)</tspan></tspan>
</text>
</g>
<g transform="translate(40, 150)">
