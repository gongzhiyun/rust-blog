<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <rect width="900" height="600" fill="#f8f9fa"/>
  <defs>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff9800" />
    </marker>
    <marker id="arrowhead-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#757575" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ef5350" />
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="1" dy="1" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" font-weight="bold" fill="#333333">结构体引用的内存布局与生命周期</text>
  <!-- Main Container -->
  <g transform="translate(80, 85)">
    <!-- Timeline (Left Axis) -->
    <g transform="translate(0, 0)">
      <line x1="0" y1="20" x2="0" y2="460" stroke="#bdbdbd" stroke-width="2" stroke-dasharray="4 2"/>
      <path d="M -12 440 L -12 40" fill="none" stroke="#757575" stroke-width="1.5" marker-end="url(#arrowhead-gray)"/>
      <text x="-18" y="240" font-family="JetBrains Mono, monospace" font-size="11" fill="#757575" font-weight="bold" transform="rotate(-90 -18,240)">分配方向 (Push)</text>
      <path d="M 12 40 L 12 440" fill="none" stroke="#ef5350" stroke-width="1.5" marker-end="url(#arrowhead-red)"/>
      <text x="18" y="240" font-family="JetBrains Mono, monospace" font-size="11" fill="#ef5350" font-weight="bold" transform="rotate(90 18,240)">释放方向 (Pop)</text>
      <circle cx="0" cy="40" r="4" fill="#8e24aa"/>
      <circle cx="0" cy="200" r="4" fill="#1565c0"/>
      <circle cx="0" cy="300" r="4" fill="#ef5350"/>
      <circle cx="0" cy="460" r="4" fill="#2e7d32"/>
    </g>
    <!-- Memory Layout Region -->
    <g transform="translate(80, 0)">
      <!-- Stack -->
      <g transform="translate(0, 0)">
        <rect width="320" height="35" rx="15" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
        <text x="160" y="23" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#1565c0">Stack (栈内存)</text>
        <rect y="45" width="320" height="460" rx="15" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
        <!-- i: ImportantExcerpt -->
        <g transform="translate(15, 70)">
          <rect width="290" height="160" rx="12" fill="#f3e5f5" fill-opacity="0.1" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="6 2"/>
          <text x="280" y="150" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" font-weight="bold" fill="#9c27b0">生命周期 'a</text>
          <g transform="translate(10, 25)">
            <text x="0" y="-8" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#8e24aa">i: ImportantExcerpt</text>
            <rect width="270" height="110" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
            <g transform="translate(10, 15)">
              <text x="0" y="-5" font-family="JetBrains Mono, monospace" font-size="10" fill="#6a1b9a">part: &amp;str</text>
              <rect width="250" height="80" rx="6" fill="#ffffff" stroke="#ce93d8" stroke-width="1"/>
              <!-- Pointer Field for i -->
              <g transform="translate(10, 15)">
                <rect width="230" height="35" rx="4" fill="#fff8e1" stroke="#ff9800" stroke-width="1.2"/>
                <text x="10" y="22" font-family="JetBrains Mono, monospace" font-size="11" fill="#ef6c00" font-weight="bold">ptr</text>
                <text x="220" y="22" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c">0x1000</text>
                <circle id="ptr-i-origin" cx="225" cy="17.5" r="3" fill="#f57c00"/>
              </g>
            </g>
          </g>
        </g>
        <!-- novel: String -->
        <g transform="translate(15, 270)">
          <rect width="290" height="210" rx="12" fill="#e8f5e9" fill-opacity="0.1" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="6 2"/>
          <text x="280" y="200" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" font-weight="bold" fill="#2e7d32">生命周期 'novel</text>
          <g transform="translate(10, 25)">
            <text x="0" y="-8" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#2e7d32">novel: String</text>
            <rect width="270" height="150" rx="8" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
            <!-- Pointer Field for novel -->
            <g transform="translate(10, 15)">
              <rect width="230" height="35" rx="4" fill="#fff8e1" stroke="#ff9800" stroke-width="1.2"/>
              <text x="10" y="22" font-family="JetBrains Mono, monospace" font-size="11" fill="#ef6c00" font-weight="bold">ptr</text>
              <text x="220" y="22" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c">0x1000</text>
              <circle id="ptr-novel-origin" cx="225" cy="17.5" r="3" fill="#f57c00"/>
            </g>
            <g transform="translate(10, 60)">
              <rect width="230" height="30" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
              <text x="10" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#555555">len</text>
              <text x="220" y="20" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c">16</text>
            </g>
            <g transform="translate(10, 100)">
              <rect width="230" height="30" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
              <text x="10" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#555555">cap</text>
              <text x="220" y="20" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c">16</text>
            </g>
          </g>
        </g>
      </g>
      <!-- Heap -->
      <g transform="translate(360, 0)">
        <rect width="300" height="35" rx="15" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1.5"/>
        <text x="150" y="23" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#2e7d32">Heap (堆内存)</text>
        <rect y="45" width="300" height="460" rx="15" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" filter="url(#shadow)"/>
        <!-- Data Block -->
        <g transform="translate(30, 120)">
          <text x="0" y="-12" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c" font-weight="bold">0x1000</text>
          <g transform="translate(0, 0)">
            <g transform="translate(0, 0)"><rect id="heap-start" width="55" height="60" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/><text x="27.5" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#1b5e20">C</text></g>
            <g transform="translate(60, 0)"><rect width="55" height="60" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/><text x="27.5" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#1b5e20">a</text></g>
            <g transform="translate(120, 0)"><rect width="55" height="60" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/><text x="27.5" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#1b5e20">l</text></g>
            <g transform="translate(180, 0)"><rect width="55" height="60" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/><text x="27.5" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#1b5e20">l</text></g>
            <g transform="translate(0, 65)"><rect width="55" height="60" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/><text x="27.5" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#1b5e20"> </text></g>
            <g transform="translate(60, 65)"><rect width="55" height="60" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/><text x="27.5" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#1b5e20">m</text></g>
            <g transform="translate(120, 65)"><rect width="55" height="60" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/><text x="27.5" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#1b5e20">e</text></g>
            <g transform="translate(180, 65)"><rect width="55" height="60" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1.5"/><text x="27.5" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#1b5e20"> </text></g>
          </g>
        </g>
      </g>
      <!-- Optimized Connection Arrows -->
      <!-- Adjusted start points to be exactly on circle centers -->
      <path d="M 270 142.5 C 330 142.5, 350 150, 390 150" fill="none" stroke="#ff9800" stroke-width="2.5" marker-end="url(#arrowhead-orange)"/>
      <path d="M 260 327.5 C 330 327.5, 350 150, 390 150" fill="none" stroke="#ff9800" stroke-width="2.5" marker-end="url(#arrowhead-orange)"/>
    </g>
  </g>
</svg>