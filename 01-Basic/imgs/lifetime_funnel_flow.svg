<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
    <!-- Background -->
    <rect width="800" height="400" rx="15" fill="#f8f9fa"/>
    
    <!-- Title -->
    <text x="400" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" font-weight="bold" fill="#333333">漏斗模型：生命周期约束的收敛</text>

    <!-- Function Signature -->
    <rect x="140" y="65" width="520" height="40" rx="20" fill="#f3e5f5" stroke="#9c27b0" stroke-width="1.5"/>
    <text x="400" y="90" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="15" font-weight="bold" fill="#6a1b9a">fn longest&lt;'a&gt;(x: &amp;'a str, y: &amp;'a str) -&gt; &amp;'a str</text>

    <!-- Input Section -->
    <text x="120" y="130" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#555555">输入引用的生命周期</text>
    
    <!-- Input X Bar -->
    <g transform="translate(60, 150)">
        <rect width="30" height="200" rx="4" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
        <text x="15" y="-10" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#1565c0">'x</text>
        <text x="-10" y="100" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#1565c0" transform="rotate(-90 -10 100)">较长生命周期</text>
    </g>

    <!-- Input Y Bar -->
    <g transform="translate(150, 150)">
        <rect width="30" height="120" rx="4" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
        <text x="15" y="-10" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#ff9800">'y</text>
        <text x="45" y="60" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#ff9800" transform="rotate(90 45 60)">较短生命周期</text>
    </g>

    <!-- The Funnel Effect (Visualized as intersection) -->
    <g transform="translate(250, 150)">
        <!-- Funnel Shape -->
        <path d="M0 0 L 300 10 L 300 110 L 0 120 Z" fill="#ffffff" fill-opacity="0.6" stroke="#9c27b0" stroke-width="1.5" stroke-dasharray="6 3"/>
        <text x="150" y="65" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#6a1b9a">收敛至最小交集 (min)</text>
        <text x="150" y="85" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#6a1b9a">'a = min('x, 'y)</text>
        
        <!-- Connection Lines from X and Y -->
        <path d="M-160 0 L 0 0" stroke="#1565c0" stroke-width="1" stroke-dasharray="4 2"/>
        <path d="M-70 120 L 0 120" stroke="#ff9800" stroke-width="1" stroke-dasharray="4 2"/>
    </g>

    <!-- Output Section -->
    <text x="680" y="130" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#555555">输出引用的生命周期</text>
    
    <!-- Output 'a Bar -->
    <g transform="translate(665, 150)">
        <rect width="30" height="120" rx="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
        <text x="15" y="-10" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#2e7d32">'a</text>
        <text x="45" y="60" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#2e7d32" transform="rotate(90 45 60)">受限于最短输入</text>
        
        <!-- Connection Line from Funnel -->
        <path d="M-115 10 L 0 0" stroke="#2e7d32" stroke-width="1" stroke-dasharray="4 2" transform="translate(0, 0)"/>
        <path d="M-115 110 L 0 120" stroke="#2e7d32" stroke-width="1" stroke-dasharray="4 2" transform="translate(0, 0)"/>
    </g>

    <!-- Key Insights -->
    <g transform="translate(100, 360)">
        <rect x="0" y="0" width="600" height="30" rx="15" fill="#fcfcfc" stroke="#e0e0e0" stroke-width="1"/>
        <text x="300" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#666666">
            生命周期标注并非延长数据的寿命，而是描述引用的 <tspan fill="#d32f2f" font-weight="bold">最小公共有效区间</tspan>。
        </text>
    </g>

    <!-- Arrows -->
    <defs>
        <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#9c27b0" />
        </marker>
    </defs>
</svg>
