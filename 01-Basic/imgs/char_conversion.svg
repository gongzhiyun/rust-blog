<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="710" viewBox="0 0 800 710" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
<rect width="800" height="710" fill="#f8f9fa" rx="15"/>
<!-- Title Section -->
<text x="400" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="22" font-weight="bold" fill="#333333">类型转换与安全性：char ↔ u32</text>
<!-- Code Section -->
<g transform="translate(50, 75)">
<rect width="700" height="165" rx="12" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
<path d="M0 12 Q0 0 12 0 H688 Q700 0 700 12 V35 H0 Z" fill="#f3e5f5"/>
<text x="350" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#6a1b9a">演示代码</text>
<text x="30" y="65" font-family="JetBrains Mono, monospace" font-size="13" fill="#333333">
<tspan x="30" dy="0"><tspan fill="#6a1b9a">fn</tspan> <tspan fill="#2e7d32">main</tspan>() {</tspan>
<tspan x="50" dy="1.4em"><tspan fill="#6a1b9a">let</tspan> u = <tspan fill="#f57c00">'A'</tspan> <tspan fill="#6a1b9a">as</tspan> <tspan fill="#1565c0">u32</tspan>; <tspan fill="#78909c">// 0x41 (始终安全)</tspan></tspan>
<tspan x="50" dy="1.4em"><tspan fill="#6a1b9a">let</tspan> c = <tspan fill="#1565c0">char</tspan>::<tspan fill="#2e7d32">from_u32</tspan>(u); <tspan fill="#78909c">// Some('A')</tspan></tspan>
<tspan x="50" dy="1.4em"><tspan fill="#2e7d32">assert_eq!</tspan>(c, <tspan fill="#6a1b9a">Some</tspan>(<tspan fill="#f57c00">'A'</tspan>));</tspan>
<tspan x="30" dy="1.4em">}</tspan>
</text>
</g>
<!-- Space Comparison Section -->
<g transform="translate(40, 285)">
<text x="0" y="20" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333333">u32 全域空间与 Unicode 安全子集 (4000:1 比例)</text>
<!-- Full u32 Space Bar -->
<g transform="translate(0, 40)">
<rect x="0" y="0" width="720" height="25" rx="4" fill="#eceff1" stroke="#90a4ae" stroke-width="1"/>
<rect x="4" y="0" width="716" height="25" rx="0" fill="url(#hazard_pattern)" opacity="0.4" />
<rect x="0" y="0" width="4" height="25" rx="2" fill="#4caf50" stroke="#2e7d32" stroke-width="1"/>
<text x="0" y="-8" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c">0</text>
<text x="720" y="-8" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c">u32::MAX (≈42.9亿)</text>
<text x="720" y="45" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#ef5350">⚠️ 绝大部分 (99.97%) 对 char 无效</text>
<text x="0" y="45" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#2e7d32">✅ Unicode 候选区 (仅111万)</text>
</g>
<!-- Zoom Projection -->
<polygon points="2,65 6,65 720,120 0,120" fill="#4caf50" opacity="0.1"/>
<path d="M2 65 L0 120 M6 65 L720 120" stroke="#4caf50" stroke-width="1" opacity="0.3"/>
<!-- Magnified Unicode Space -->
<g transform="translate(0, 120)">
<text x="0" y="-8" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#2e7d32">放大视图：Unicode 范围 (0x0000 ~ 0x10FFFF)</text>
<rect x="0" y="0" width="720" height="40" rx="4" fill="#e0e0e0" />
<rect x="0" y="0" width="280" height="40" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
<text x="140" y="25" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#2e7d32">0x0000 ~ 0xD7FF</text>
<rect x="280" y="0" width="80" height="40" fill="#ffebee" stroke="#ef5350" stroke-width="1"/>
<text x="320" y="18" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#c62828">代理对</text>
<text x="320" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#c62828">(禁止区)</text>
<rect x="360" y="0" width="360" height="40" rx="4" fill="#e8f5e9" stroke="#4caf50" stroke-width="1"/>
<text x="540" y="25" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#2e7d32">0xE000 ~ 0x10FFFF</text>
<text x="140" y="55" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c">合法标量 (USV)</text>
<text x="540" y="55" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c">合法标量 (USV)</text>
</g>
</g>
<!-- Optimized Conversion Flow -->
<g transform="translate(40, 500)">
<text x="360" y="10" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#333333">转换流向与安全性验证</text>
<!-- Source: char -->
<g transform="translate(0, 40)">
<rect width="120" height="60" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="2"/>
<rect width="120" height="25" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1"/>
<text x="60" y="17" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#1565c0">char (4B)</text>
<text x="60" y="45" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" fill="#333333">'😀'</text>
</g>
<!-- Target: u32 -->
<g transform="translate(600, 40)">
<rect width="120" height="60" rx="8" fill="#ffffff" stroke="#2e7d32" stroke-width="2"/>
<rect width="120" height="25" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
<text x="60" y="17" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#2e7d32">u32 (4B)</text>
<text x="60" y="45" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" fill="#333333">0x1F600</text>
</g>
<!-- Flow: char -> u32 (Always Safe) -->
<path d="M125 60 Q360 25 595 60" fill="none" stroke="#1565c0" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#blue_arrow)"/>
<text x="360" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#1565c0">as u32 (无条件转换，始终安全)</text>
<!-- Validation Gate -->
<g transform="translate(310, 65)">
<rect width="100" height="40" rx="4" fill="#fff9c4" stroke="#fbc02d" stroke-width="2"/>
<text x="50" y="18" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="bold" fill="#f57c00">合法性</text>
<text x="50" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" font-weight="bold" fill="#f57c00">校验</text>
</g>
<!-- Path: u32 -> Gate -->
<path d="M600 85 L415 85" fill="none" stroke="#ef5350" stroke-width="2" marker-end="url(#red_arrow)"/>
<text x="507" y="105" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#ef5350">char::from_u32(n)</text>
<!-- Path: Gate -> char -->
<path d="M310 85 L125 85" fill="none" stroke="#4caf50" stroke-width="2" marker-end="url(#green_arrow)"/>
<text x="217" y="105" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#2e7d32">Some(char)</text>
<!-- Validation Output: Failure -->
<path d="M360 105 L360 140" fill="none" stroke="#ef5350" stroke-width="2" marker-end="url(#red_arrow)"/>
<text x="360" y="155" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#c62828">None (非法数值)</text>
</g>
<defs>
<pattern id="hazard_pattern" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
<line x1="0" y1="0" x2="0" y2="10" stroke="#ef5350" stroke-width="5" />
</pattern>
<marker id="blue_arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#1565c0" />
</marker>
<marker id="green_arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#4caf50" />
</marker>
<marker id="red_arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
<path d="M0,0 L0,6 L9,3 z" fill="#ef5350" />
</marker>
</defs>
</svg>
