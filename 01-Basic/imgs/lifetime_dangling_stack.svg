<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="400" viewBox="0 0 700 400" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
  <!-- 背景 -->
  <rect width="700" height="400" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="350" y="30" font-family="JetBrains Mono, monospace" font-size="18" font-weight="bold" fill="#333" text-anchor="middle">Stack Memory (栈内存)</text>
  
  <!-- Stack 容器 -->
  <g transform="translate(220, 50)">
    <!-- 整个栈空间的背景 -->
    <rect x="0" y="0" width="300" height="320" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="2"/>
    
    <!-- 栈增长方向指示器 (左侧) -->
    <defs>
      <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
        <path d="M0,0 L0,6 L7,3 z" fill="#757575" />
      </marker>
    </defs>
    <line x1="-30" y1="20" x2="-30" y2="300" stroke="#757575" stroke-width="2" marker-end="url(#arrow-gray)"/>
    <text x="-40" y="20" font-family="JetBrains Mono, monospace" font-size="10" fill="#757575" text-anchor="end">High Addr (高地址)</text>
    <text x="-40" y="300" font-family="JetBrains Mono, monospace" font-size="10" fill="#757575" text-anchor="end">Low Addr (低地址)</text>

    <!-- 1. 活跃的栈帧 (Active Frame) -->
    <g transform="translate(10, 20)">
        <rect x="0" y="0" width="280" height="100" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
        <text x="10" y="20" font-family="JetBrains Mono, monospace" font-size="12" fill="#1565c0" font-weight="bold">Current Stack Frame (当前栈帧)</text>
        
        <!-- 变量 r -->
        <g transform="translate(20, 40)">
            <rect x="0" y="0" width="240" height="40" rx="4" fill="#ffffff" stroke="#1565c0" stroke-width="1"/>
            <text x="10" y="25" font-family="JetBrains Mono, monospace" font-size="14" fill="#333">r: &amp;i32</text>
            <!-- r 的值 -->
            <rect x="130" y="5" width="100" height="30" rx="4" fill="#fff8e1" stroke="#ff9800" stroke-width="1"/>
            <text x="180" y="25" font-family="JetBrains Mono, monospace" font-size="12" fill="#ef6c00" text-anchor="middle">0x7ffee4</text>
            <!-- 指针连接点 -->
            <circle cx="230" cy="20" r="4" fill="#ef6c00"/>
        </g>
    </g>

    <!-- 栈指针 SP -->
    <line x1="0" y1="140" x2="300" y2="140" stroke="#d32f2f" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="310" y="145" font-family="JetBrains Mono, monospace" font-size="12" fill="#d32f2f" font-weight="bold">Stack Pointer (SP)</text>

    <!-- 2. 已释放的栈空间 (Popped Scope) -->
    <g transform="translate(10, 160)">
        <rect x="0" y="0" width="280" height="120" rx="8" fill="#ffebee" stroke="#d32f2f" stroke-width="2" stroke-dasharray="8,4"/>
        <text x="10" y="20" font-family="JetBrains Mono, monospace" font-size="12" fill="#d32f2f" font-weight="bold">Popped Scope (已弹出/无效内存)</text>
        
        <!-- 变量 x (已销毁) -->
        <g transform="translate(20, 40)">
            <!-- x 的内存框 -->
            <rect x="0" y="0" width="240" height="40" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1" opacity="0.7"/>
            <text x="10" y="25" font-family="JetBrains Mono, monospace" font-size="14" fill="#9e9e9e" text-decoration="line-through">x: i32</text>
            
            <!-- x 的值 -->
            <text x="180" y="25" font-family="JetBrains Mono, monospace" font-size="12" fill="#9e9e9e" text-anchor="middle">5</text>
            
            <!-- 内存地址标记 -->
            <g transform="translate(0, 55)">
                <text x="10" y="10" font-family="JetBrains Mono, monospace" font-size="10" fill="#d32f2f" font-weight="bold">Addr:</text>
                <text x="50" y="10" font-family="JetBrains Mono, monospace" font-size="10" fill="#78909c">0x7ffee4</text>
            </g>
        </g>
    </g>
    
    <!-- 悬垂引用箭头 -->
    <defs>
        <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L7,3 z" fill="#d32f2f" />
        </marker>
    </defs>
    <!-- 从 r (上方) 指向 x (下方) -->
    <path d="M 260 80 C 340 80, 340 210, 260 210" stroke="#d32f2f" stroke-width="2" fill="none" marker-end="url(#arrow-red)"/>
    
    <!-- 错误标签 (增大高度，包含子标题) -->
    <rect x="310" y="180" width="120" height="45" rx="4" fill="#ffebee" stroke="#d32f2f"/>
    <text x="370" y="200" font-family="JetBrains Mono, monospace" font-size="12" fill="#d32f2f" text-anchor="middle" font-weight="bold">Dangling!</text>
    <text x="370" y="218" font-family="JetBrains Mono, monospace" font-size="10" fill="#d32f2f" text-anchor="middle">(悬垂引用)</text>

  </g>
</svg>