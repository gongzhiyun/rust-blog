<?xml version="1.0" encoding="UTF-8"?>
<svg width="840" height="1160" viewBox="0 0 840 1160" fill="none" xmlns="http://www.w3.org/2000/svg" shape-rendering="geometricPrecision" text-rendering="geometricPrecision">
    <!-- Professional Canvas Background -->
    <rect width="840" height="1160" rx="20" fill="#f8f9fa"/>
    
    <!-- Header Section -->
    <text x="420" y="45" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="24" font-weight="bold" fill="#2c3e50">生命周期失效：内存物理演变全景图</text>
    <text x="420" y="70" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#7f8c8d">物理层面的借用校验与悬垂引用成因</text>

    <!-- Global Definitions -->
    <defs>
        <filter id="shadow" x="-2" y="-2" width="104%" height="104%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.05"/>
        </filter>
        <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#3498db" />
        </marker>
        <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71" />
        </marker>
        <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c" />
        </marker>
    </defs>

    <!-- STEP 1: INITIAL ALLOCATION -->
    <g transform="translate(40, 100)">
        <rect width="180" height="28" rx="14" fill="#3498db" fill-opacity="0.1"/>
        <text x="15" y="19" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" fill="#2980b9">STEP 1: 建立合法借用</text>
        
        <rect y="35" width="760" height="300" rx="15" fill="#ffffff" filter="url(#shadow)" stroke="#e0e0e0" stroke-width="1"/>
        
        <!-- Optimized Stack Region -->
        <g transform="translate(25, 65)">
            <rect width="320" height="245" rx="12" fill="#fdfdfe" stroke="#ecf0f1" stroke-width="1"/>
            <rect width="320" height="32" rx="12" fill="#e3f2fd"/>
            <rect y="16" width="320" height="16" fill="#e3f2fd"/>
            <text x="160" y="21" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#1565c0">Stack (栈内存布局)</text>
            
            <!-- Address Column Labels -->
            <text x="10" y="55" font-family="JetBrains Mono, monospace" font-size="9" fill="#95a5a6">Address</text>
            <text x="240" y="55" font-family="JetBrains Mono, monospace" font-size="9" fill="#95a5a6">Value/Data</text>

            <!-- r variable (8-byte slot) -->
            <g transform="translate(10, 65)">
                <text x="0" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#7f8c8d">0x7ff010</text>
                <rect x="65" width="240" height="35" rx="4" fill="#fff8e1" stroke="#ff9800" stroke-width="1.5"/>
                <text x="185" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#2c3e50">0x7ff020</text>
                <text x="75" y="15" font-family="JetBrains Mono, monospace" font-size="8" fill="#f57c00">r: &amp;String</text>
            </g>

            <!-- x variable (Contiguous 24-byte block) -->
            <g transform="translate(10, 115)">
                <!-- Slot 1: ptr -->
                <g>
                    <text x="0" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#7f8c8d">0x7ff020</text>
                    <rect x="65" width="240" height="30" fill="#e8f5e9" stroke="#2ecc71" stroke-width="1"/>
                    <text x="185" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#27ae60">ptr: 0x5500aa</text>
                    <text x="75" y="12" font-family="JetBrains Mono, monospace" font-size="8" fill="#27ae60">x: String</text>
                </g>
                <!-- Slot 2: len -->
                <g transform="translate(0, 30)">
                    <text x="0" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#7f8c8d">0x7ff028</text>
                    <rect x="65" width="240" height="30" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
                    <text x="185" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7f8c8d">len: 5</text>
                </g>
                <!-- Slot 3: cap -->
                <g transform="translate(0, 60)">
                    <text x="0" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#7f8c8d">0x7ff030</text>
                    <rect x="65" width="240" height="30" rx="4" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
                    <rect x="65" width="240" height="15" fill="#ffffff"/> <!-- fix bottom rounded corner -->
                    <rect x="65" y="15" width="240" height="15" fill="#ffffff" stroke="#e0e0e0" stroke-width="1"/>
                    <text x="185" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#7f8c8d">cap: 5</text>
                </g>
            </g>
        </g>
        
        <!-- Heap Region -->
        <g transform="translate(385, 65)">
            <rect width="350" height="245" rx="12" fill="#fdfdfe" stroke="#ecf0f1" stroke-width="1"/>
            <rect width="350" height="32" rx="12" fill="#e8f5e9"/>
            <rect y="16" width="350" height="16" fill="#e8f5e9"/>
            <text x="175" y="21" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#2e7d32">Heap (堆内存)</text>
            
            <g transform="translate(50, 90)">
                <rect width="250" height="60" rx="8" fill="#ffffff" stroke="#2ecc71" stroke-width="2.5"/>
                <text x="10" y="18" font-family="JetBrains Mono, monospace" font-size="10" fill="#27ae60">0x5500aa</text>
                <text x="125" y="42" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="20" font-weight="bold" fill="#2c3e50">"Hello"</text>
            </g>
        </g>
        
        <!-- Pointers -->
        <path d="M 280,82 C 340,82 340,132 285,132" stroke="#3498db" stroke-width="2" fill="none" marker-end="url(#arrow-blue)" />
        <path d="M 285,132 C 400,132 380,145 435,145" stroke="#2ecc71" stroke-width="2" fill="none" marker-end="url(#arrow-green)" />
    </g>

    <!-- STEP 2: SCOPE END / DROP -->
    <g transform="translate(40, 450)">
        <rect width="180" height="28" rx="14" fill="#e74c3c" fill-opacity="0.1"/>
        <text x="15" y="19" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" fill="#c0392b">STEP 2: 作用域结束 &amp; 销毁</text>
        
        <rect y="35" width="760" height="300" rx="15" fill="#ffffff" filter="url(#shadow)" stroke="#e0e0e0" stroke-width="1"/>
        
        <!-- Stack T2 -->
        <g transform="translate(25, 65)">
            <rect width="320" height="245" rx="12" fill="#fafafa" stroke="#ecf0f1" stroke-width="1"/>
            <rect width="320" height="32" rx="12" fill="#f5f5f5"/>
            <rect y="16" width="320" height="16" fill="#f5f5f5"/>
            <text x="160" y="21" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#95a5a6">Stack (栈内存)</text>
            
            <g transform="translate(10, 65)">
                <text x="0" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#7f8c8d">0x7ff010</text>
                <rect x="65" width="240" height="35" rx="4" fill="#fff8e1" stroke="#ff9800" stroke-width="1.5"/>
                <text x="185" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#2c3e50">0x7ff020</text>
            </g>

            <g transform="translate(10, 115)">
                <rect x="65" width="240" height="90" rx="6" fill="#f9f9f9" stroke="#e74c3c" stroke-width="1" stroke-dasharray="4 2"/>
                <text x="185" y="52" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="14" font-weight="bold" fill="#e74c3c" fill-opacity="0.6">DROPPED</text>
                <path d="M 85,20 L 285,70 M 285,20 L 85,70" stroke="#e74c3c" stroke-width="2" stroke-opacity="0.2"/>
            </g>
        </g>
        
        <!-- Heap T2 -->
        <g transform="translate(385, 65)">
            <rect width="350" height="245" rx="12" fill="#fafafa" stroke="#ecf0f1" stroke-width="1"/>
            <rect width="350" height="32" rx="12" fill="#f5f5f5"/>
            <rect y="16" width="350" height="16" fill="#f5f5f5"/>
            <text x="175" y="21" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#95a5a6">Heap (堆内存)</text>
            
            <g transform="translate(50, 90)">
                <rect width="250" height="60" rx="8" fill="#f5f5f5" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="4 4"/>
                <text x="125" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="16" font-weight="bold" fill="#bdc3c7">FREED</text>
            </g>
        </g>
    </g>

    <!-- STEP 3: PROBLEM - DANGLING ACCESS -->
    <g transform="translate(40, 800)">
        <rect width="180" height="28" rx="14" fill="#c0392b" fill-opacity="0.1"/>
        <text x="15" y="19" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" fill="#c0392b">STEP 3: 产生悬垂引用</text>
        
        <rect y="35" width="760" height="300" rx="15" fill="#fff5f5" filter="url(#shadow)" stroke="#e74c3c" stroke-width="2"/>
        
        <!-- Stack T3 -->
        <g transform="translate(25, 65)">
            <rect width="320" height="245" rx="12" fill="#ffffff" stroke="#e74c3c" stroke-width="1" stroke-dasharray="2 2"/>
            <text x="160" y="21" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#c0392b">Stack Frame</text>
            
            <g transform="translate(10, 65)">
                <text x="0" y="22" font-family="JetBrains Mono, monospace" font-size="10" fill="#c0392b">0x7ff010</text>
                <rect x="65" width="240" height="35" rx="4" fill="#fff8e1" stroke="#e74c3c" stroke-width="2"/>
                <text x="185" y="22" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" font-weight="bold" fill="#e74c3c">0x7ff020</text>
            </g>
            
            <g transform="translate(75, 125)">
                <text x="110" y="20" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#c0392b">⚠️ 访问已销毁的栈地址 ⚠️</text>
                <rect y="35" width="220" height="50" rx="6" fill="#e74c3c" fill-opacity="0.05" stroke="#e74c3c" stroke-dasharray="2 2"/>
                <text x="110" y="65" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#c0392b">0x7ff020 及其后续单元已无效</text>
            </g>
        </g>
        
        <!-- Logic Explanation -->
        <g transform="translate(385, 65)">
            <rect width="350" height="245" rx="12" fill="#ffffff" stroke="#e74c3c" stroke-width="1" stroke-dasharray="6 3"/>
            <text x="25" y="40" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" fill="#c0392b">借用检查器拒绝理由：</text>
            
            <g transform="translate(25, 65)">
                <text x="0" y="0" font-family="JetBrains Mono, monospace" font-size="11" fill="#34495e">1. 变量 r 在 main 函数结束前有效</text>
                <text x="0" y="22" font-family="JetBrains Mono, monospace" font-size="11" fill="#34495e">2. 它引用的 x 在内部作用域已销毁</text>
                <text x="0" y="44" font-family="JetBrains Mono, monospace" font-size="11" font-weight="bold" fill="#c0392b">3. 存在无效内存访问风险 (UB)</text>
                
                <rect y="85" width="300" height="75" rx="8" fill="#e74c3c"/>
                <text x="150" y="115" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" font-weight="bold" fill="#ffffff">error[E0597]: `x` dropped</text>
                <text x="150" y="135" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#ffffff" fill-opacity="0.9">while still borrowed</text>
            </g>
        </g>
        
        <!-- Final Dangerous Pointer -->
        <path d="M 280,82 C 340,82 340,152 285,152" stroke="#e74c3c" stroke-width="3" fill="none" marker-end="url(#arrow-red)" />
    </g>

    <!-- Flow Arrows between steps -->
    <path d="M 420,410 L 420,435" stroke="#bdc3c7" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-gray)" />
    <path d="M 420,760 L 420,785" stroke="#bdc3c7" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow-gray)" />
    <defs>
        <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#bdc3c7" />
        </marker>
    </defs>
</svg>
